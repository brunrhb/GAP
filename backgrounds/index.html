<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAP · Fonds mesh gradient</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: #0f0e0c;
      color: #f0ece4;
      min-height: 100vh;
      padding: 48px 40px;
    }
    h1 {
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: #504a44; margin-bottom: 36px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .card {
      display: block; text-decoration: none;
      border-radius: 10px; overflow: hidden;
      aspect-ratio: 4/3; position: relative;
      transition: transform 0.18s ease;
    }
    .card:hover { transform: scale(1.025); }
    .bg { width: 100%; height: 100%; }

    /* Approximations CSS — remplacées par le vrai gradient en ouvrant la page */
    .bg-sale   { background: radial-gradient(ellipse 70% 55% at 22% 68%, #de6040 0%, transparent 52%), linear-gradient(135deg, #b8b4cc 0%, #d4d0e4 55%, #c8c4dc 100%); }
    .bg-froid  { background: radial-gradient(ellipse 55% 45% at 18% 72%, #f09070 0%, transparent 48%), linear-gradient(135deg, #e8e5ef 0%, #c0bcd8 55%, #ccc8e0 100%); }
    .bg-creme  { background: radial-gradient(ellipse 50% 40% at 72% 28%, #f4c4b8 0%, transparent 55%), linear-gradient(135deg, #f0ece4 0%, #e8e5ef 60%, #f4c4b8 100%); }
    .bg-chaud  { background: radial-gradient(ellipse 65% 50% at 28% 62%, #e87050 0%, transparent 58%), linear-gradient(135deg, #f4c4b8 0%, #e87050 55%, #f0a080 100%); }
    .bg-vif    { background: radial-gradient(ellipse 60% 50% at 32% 65%, #d9502f 0%, transparent 52%), linear-gradient(135deg, #b8b4d8 0%, #d9502f 52%, #f4c4b8 100%); }

    .meta {
      position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, transparent 100%);
    }
    .meta .name { font-size: 14px; font-weight: 600; letter-spacing: 0.04em; color: #fff; }
    .meta .desc { font-size: 10px; opacity: 0.65; margin-top: 2px; letter-spacing: 0.07em; text-transform: uppercase; color: #fff; }
  </style>
</head>
<body>
  <h1>GAP · Fonds mesh gradient — WebGL + grain</h1>
  <div class="grid">
    <a class="card" href="sale.html">
      <div class="bg bg-sale"></div>
      <div class="meta">
        <div class="name">Sale</div>
        <div class="desc">Gris-violet-bleu sale pâle · contamination orange</div>
      </div>
    </a>
    <a class="card" href="froid.html">
      <div class="bg bg-froid"></div>
      <div class="meta">
        <div class="name">Froid</div>
        <div class="desc">Lavande domine · orange en accent</div>
      </div>
    </a>
    <a class="card" href="creme.html">
      <div class="bg bg-creme"></div>
      <div class="meta">
        <div class="name">Crème</div>
        <div class="desc">Papier très pâle · très doux</div>
      </div>
    </a>
    <a class="card" href="chaud.html">
      <div class="bg bg-chaud"></div>
      <div class="meta">
        <div class="name">Chaud</div>
        <div class="desc">Pêche/orange domine · lavande contrepoint</div>
      </div>
    </a>
    <a class="card" href="vif.html">
      <div class="bg bg-vif"></div>
      <div class="meta">
        <div class="name">Vif</div>
        <div class="desc">Les deux côtés saturés</div>
      </div>
    </a>
  </div>
</body>
</html>
