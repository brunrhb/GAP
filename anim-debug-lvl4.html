<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAP — Anim debug lvl4</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0ece4; overflow: hidden; font-family: monospace; }
    canvas { display: block; position: fixed; inset: 0; }

    /* ── Fenêtres flottantes ───────────────────────────── */
    .fp {
      position: fixed;
      z-index: 100;
      min-width: 11em;
      width: 14em;           /* largeur de départ, redimensionnable */
      resize: horizontal;    /* drag sur le bord droit pour élargir */
      overflow: hidden;
      background: rgba(12, 11, 10, 0.82);
      border-radius: 0.4em;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 0.3em 1.5em rgba(0,0,0,0.35);
      font-size: 11px;       /* tout en em → scale avec font-size */
      color: #f0ece4;
      user-select: none;
    }

    /* header = poignée de drag */
    .fp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5em 0.7em;
      cursor: grab;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .fp-header:active { cursor: grabbing; }
    .fp-header.dragging { cursor: grabbing; }

    .fp-title {
      font-size: 0.9em;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: bold;
      opacity: 0.9;
    }

    .fp-toggle {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      font-size: 0.85em;
      opacity: 0.5;
      padding: 0 0.2em;
      line-height: 1;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .fp-toggle:hover { opacity: 1; }

    /* corps collapsible */
    .fp-body {
      padding: 0.55em 0.7em 0.7em;
      display: flex;
      flex-direction: column;
      gap: 0.3em;
      overflow: hidden;
      transition: max-height 0.2s ease, padding 0.2s ease, opacity 0.15s ease;
      max-height: 60em; /* assez grand pour tout */
      opacity: 1;
    }
    .fp.collapsed .fp-body {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      opacity: 0;
    }

    /* couleurs d'accent par niveau */
    #fp4 .fp-header { border-left: 3px solid rgba(155,106,191,0.7); }
    #fp3 .fp-header { border-left: 3px solid rgba(120,200,100,0.7); }
    #fp2 .fp-header { border-left: 3px solid rgba(120,180,220,0.7); }
    #fp1 .fp-header { border-left: 3px solid rgba(232,112,64,0.7);  }

    /* ── Contenu panneaux ──────────────────────────────── */
    .s-label {
      font-size: 0.78em;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      opacity: 0.38;
      margin-top: 0.45em;
      padding-top: 0.35em;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .s-label:first-child { margin-top: 0; border-top: none; }

    .row {
      display: flex;
      align-items: center;
      gap: 0.35em;
    }
    .row label {
      white-space: nowrap;
      font-size: 0.9em;
      opacity: 0.65;
      flex: 0 0 5.2em;
    }

    input[type=range] {
      flex: 1;
      cursor: pointer;
      height: 0.85em;
      min-width: 0;
    }

    #fp4 input[type=range] { accent-color: #9b6abf; }
    #fp3 input[type=range] { accent-color: #82d060; }
    #fp2 input[type=range] { accent-color: #7ab8d8; }
    #fp1 input[type=range] { accent-color: #e87040; }

    input[type=color] {
      width: 1.6em; height: 1.2em;
      border: none; border-radius: 0.2em;
      cursor: pointer; padding: 1px;
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .val {
      width: 2.8em;
      text-align: right;
      opacity: 0.8;
      font-size: 0.88em;
      flex-shrink: 0;
    }

    #fp-info {
      margin-top: 0.4em;
      opacity: 0.3;
      font-size: 0.82em;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding-top: 0.35em;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<!-- ═══ FP4 — Aura mauve ═══ -->
<div class="fp" id="fp4">
  <div class="fp-header">
    <span class="fp-title" style="color:#c8a8e8;">Niv.4 — Aura</span>
    <button class="fp-toggle" title="Réduire">▾</button>
  </div>
  <div class="fp-body">
    <div class="s-label">Forme</div>
    <div class="row"><label>échelle</label><input type="range" id="sScale4" min="1.05" max="3.5" step="0.01" value="1.8"><span class="val" id="vScale4">1.8×</span></div>
    <div class="s-label">Apparence</div>
    <div class="row"><label>couleur</label><input type="color" id="cCol4" value="#9b6abf"></div>
    <div class="row"><label>opacité</label><input type="range" id="sOp4" min="0" max="1" step="0.01" value="0.16"><span class="val" id="vOp4">0.16</span></div>
    <div class="row"><label>flou</label><input type="range" id="sBlur4" min="0" max="80" step="0.5" value="0"><span class="val" id="vBlur4">0px</span></div>
  </div>
</div>

<!-- ═══ FP3 — Aura verte ═══ -->
<div class="fp" id="fp3">
  <div class="fp-header">
    <span class="fp-title" style="color:#a8d890;">Niv.3 — Aura</span>
    <button class="fp-toggle" title="Réduire">▾</button>
  </div>
  <div class="fp-body">
    <div class="s-label">Forme</div>
    <div class="row"><label>échelle</label><input type="range" id="sScale3" min="1.05" max="2.5" step="0.01" value="1.4"><span class="val" id="vScale3">1.4×</span></div>
    <div class="s-label">Apparence</div>
    <div class="row"><label>couleur</label><input type="color" id="cCol3" value="#64c878"></div>
    <div class="row"><label>opacité</label><input type="range" id="sOp3" min="0" max="1" step="0.01" value="0.22"><span class="val" id="vOp3">0.22</span></div>
    <div class="row"><label>flou</label><input type="range" id="sBlur3" min="0" max="60" step="0.5" value="0"><span class="val" id="vBlur3">0px</span></div>
  </div>
</div>

<!-- ═══ FP2 — Membrane ═══ -->
<div class="fp" id="fp2">
  <div class="fp-header">
    <span class="fp-title" style="color:#a0cde6;">Niv.2 — Membrane</span>
    <button class="fp-toggle" title="Réduire">▾</button>
  </div>
  <div class="fp-body">
    <div class="s-label">Forme</div>
    <div class="row"><label>rayon</label><input type="range" id="sMemR" min="10" max="400" step="1" value="155"><span class="val" id="vMemR">155</span></div>
    <div class="row"><label>nb points</label><input type="range" id="sNbPts" min="4" max="32" step="1" value="10"><span class="val" id="vNbPts">10</span></div>
    <div class="row"><label>amplitude</label><input type="range" id="sAmpli" min="0" max="80" step="1" value="18"><span class="val" id="vAmpli">18</span></div>
    <div class="row"><label>vitesse</label><input type="range" id="sVit" min="0.05" max="3" step="0.05" value="0.6"><span class="val" id="vVit">0.6</span></div>
    <div class="row"><label>twist</label><input type="range" id="sTwist" min="0" max="0.5" step="0.01" value="0.08"><span class="val" id="vTwist">0.08</span></div>
    <div class="row"><label>bulge</label><input type="range" id="sBulge" min="0" max="120" step="1" value="35"><span class="val" id="vBulge">35</span></div>
    <div class="row"><label>tentacule</label><input type="range" id="sTent" min="0" max="120" step="1" value="50"><span class="val" id="vTent">50</span></div>
    <div class="row"><label>portée</label><input type="range" id="sPortee" min="0.05" max="0.95" step="0.05" value="0.4"><span class="val" id="vPortee">0.4</span></div>
    <div class="s-label">Apparence</div>
    <div class="row"><label>couleur</label><input type="color" id="cCol2" value="#a0cde6"></div>
    <div class="row"><label>opacité</label><input type="range" id="sMemO" min="0" max="1" step="0.01" value="0.38"><span class="val" id="vMemO">0.38</span></div>
    <div class="row"><label>flou</label><input type="range" id="sBlur2" min="0" max="40" step="0.5" value="0"><span class="val" id="vBlur2">0px</span></div>
  </div>
</div>

<!-- ═══ FP1 — Core + Physique ═══ -->
<div class="fp" id="fp1">
  <div class="fp-header">
    <span class="fp-title" style="color:#e8a080;">Niv.1 — Core + Physique</span>
    <button class="fp-toggle" title="Réduire">▾</button>
  </div>
  <div class="fp-body">
    <div class="s-label">Core</div>
    <div class="row"><label>couleur</label><input type="color" id="cCol1" value="#e87040"></div>
    <div class="row"><label>opacité</label><input type="range" id="sCoreO" min="0" max="1" step="0.01" value="0.88"><span class="val" id="vCoreO">0.88</span></div>
    <div class="row"><label>flou</label><input type="range" id="sBlur1" min="0" max="40" step="0.5" value="0"><span class="val" id="vBlur1">0px</span></div>
    <div class="row"><label>rayon</label><input type="range" id="sCoreR" min="10" max="300" step="1" value="112"><span class="val" id="vCoreR">112</span></div>
    <div class="s-label">Physique</div>
    <div class="row"><label>attraction</label><input type="range" id="sAttr" min="0.5" max="20" step="0.1" value="5"><span class="val" id="vAttr">5</span></div>
    <div class="row"><label>friction</label><input type="range" id="sFric" min="0.1" max="12" step="0.1" value="1.0"><span class="val" id="vFric">1.0</span></div>
    <div class="row"><label>répulsion</label><input type="range" id="sRep" min="1000" max="5000000" step="1000" value="1500000"><span class="val" id="vRep">1.5M</span></div>
    <div class="row"><label>rebond</label><input type="range" id="sRest" min="0" max="1" step="0.05" value="0.55"><span class="val" id="vRest">0.55</span></div>
    <div class="s-label">Orbite / Rôles</div>
    <div class="row"><label>orbite</label><input type="range" id="sCurl" min="0" max="3000" step="10" value="2940"><span class="val" id="vCurl">2940</span></div>
    <div class="row"><label>seuil</label><input type="range" id="sProx" min="1.5" max="8" step="0.1" value="3.5"><span class="val" id="vProx">3.5×</span></div>
    <div class="row"><label>délai rôle</label><input type="range" id="sSwitch" min="0.2" max="4" step="0.1" value="1.2"><span class="val" id="vSwitch">1.2</span></div>
    <div class="row"><label>contour</label><input type="range" id="sContour" min="0" max="1" step="0.05" value="0.65"><span class="val" id="vContour">0.65</span></div>
    <div class="s-label">Debug</div>
    <div class="row"><label>rayon lim.</label><input type="range" id="sLimitR" min="30" max="400" step="1" value="270"><span class="val" id="vLimitR">270</span></div>
    <div class="row"><label>opacité lim.</label><input type="range" id="sLimitO" min="0" max="1" step="0.01" value="0.22"><span class="val" id="vLimitO">0.22</span></div>
    <div id="fp-info">dist: — px</div>
  </div>
</div>

<script>
/* ── GAP — Anim debug lvl4
   Physique : orbite asymétrique + contour + inertie de rôle
   Rendu    : 4 couches (core / membrane / aura×2) — couleur / opacité / flou
   UI       : fenêtres flottantes draggables + collapsibles
   ─────────────────────────────────────────────────────── */

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Utilitaire couleur ────────────────────────────────────
function hexToRgba(hex, alpha, darken = 1) {
  const r = Math.round(parseInt(hex.slice(1,3),16)*darken);
  const g = Math.round(parseInt(hex.slice(3,5),16)*darken);
  const b = Math.round(parseInt(hex.slice(5,7),16)*darken);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Params ────────────────────────────────────────────────
const P = {
  attrK:5, fricK:1.0, repK:1500000, curlK:2940, restitution:0.55,
  proxMult:3.5, contourStr:0.65,
  coreR:112, coreColor:'#e87040', coreOpacity:0.88, coreBlur:0,
  limitR:270, limitOpacity:0.22,
};
const M = {
  memR:155, nbPts:10, ampli:18, vitesse:0.6, twist:0.08,
  bulge:35, tentacleStr:50, tentacleDecay:0.4,
  color:'#a0cde6', opacity:0.38, blur:0,
};
const L3 = { scale:1.4, color:'#64c878', opacity:0.22, blur:0 };
const L4 = { scale:1.8, color:'#9b6abf', opacity:0.16, blur:0 };

// ── Physique ──────────────────────────────────────────────
const CURL_BEHIND=3.0, CURL_FRONT=0.25, ATTR_FAR_CLOSE=0.05, ATTR_FAR_FAR=4.0;
const dominance=[0.0,1.0], SWITCH_SPEED=1.2;

function buildPhases(n){
  const phi=1.6180339887;
  return Array.from({length:n},(_,i)=>i*phi*Math.PI*2);
}
let phases0=buildPhases(M.nbPts), phases1=buildPhases(M.nbPts);

let W=0,H=0,cursor=null,lastTs=null,elapsed=0;
const particles=[{x:0,y:0,vx:0,vy:0},{x:0,y:0,vx:0,vy:0}];

function resize(){
  W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight;
  if(particles[0].x===0){ particles[0].x=W/2-200; particles[0].y=H/2; particles[1].x=W/2+200; particles[1].y=H/2; }
}
window.addEventListener('resize',resize); resize();
window.addEventListener('mousemove',e=>{cursor={x:e.clientX,y:e.clientY};});
function getCursor(){return cursor??{x:W/2,y:H/2};}

function physics(dt){
  const c=getCursor(),[a,b]=particles;
  const dx=b.x-a.x,dy=b.y-a.y,dist=Math.max(Math.sqrt(dx*dx+dy*dy),1);
  const nx=dx/dist,ny=dy/dist,repMag=P.repK/(dist*dist),curlMag=P.curlK/dist,tx=-ny,ty=nx;
  const dA=Math.sqrt((c.x-a.x)**2+(c.y-a.y)**2),dB=Math.sqrt((c.x-b.x)**2+(c.y-b.y)**2);
  const farIdx=dA>dB?0:1,targetDom=[0.0,0.0];
  targetDom[farIdx]=1.0;
  const speed=window._switchSpeed??SWITCH_SPEED;
  for(let i=0;i<2;i++) dominance[i]+=(targetDom[i]-dominance[i])*Math.min(speed*dt,1);
  const threshold=P.limitR*P.proxMult,proximity=Math.min(dist/threshold,1);
  for(let i=0;i<2;i++){
    const p=particles[i],sign=i===0?-1:1,dom=dominance[i];
    const challAttr=ATTR_FAR_CLOSE+proximity*(ATTR_FAR_FAR-ATTR_FAR_CLOSE);
    const attrFactor=1.0+dom*(challAttr-1.0),curlFactor=CURL_FRONT+dom*(CURL_BEHIND-CURL_FRONT);
    let fax=(c.x-p.x)*P.attrK*attrFactor,fay=(c.y-p.y)*P.attrK*attrFactor;
    const cw=dom*(1-proximity)*P.contourStr;
    if(cw>0.001){
      const o=particles[1-i],tox=o.x-p.x,toy=o.y-p.y,tod=Math.max(Math.sqrt(tox*tox+toy*toy),1);
      const t1x=-toy/tod,t1y=tox/tod,t2x=toy/tod,t2y=-tox/tod;
      const pcx=c.x-p.x,pcy=c.y-p.y,d1=t1x*pcx+t1y*pcy,d2=t2x*pcx+t2y*pcy;
      const btx=d1>=d2?t1x:t2x,bty=d1>=d2?t1y:t2y,mag=Math.sqrt(fax*fax+fay*fay);
      fax=fax*(1-cw)+btx*mag*cw; fay=fay*(1-cw)+bty*mag*cw;
    }
    p.vx+=(fax+sign*nx*repMag+sign*tx*curlMag*curlFactor-p.vx*P.fricK)*dt;
    p.vy+=(fay+sign*ny*repMag+sign*ty*curlMag*curlFactor-p.vy*P.fricK)*dt;
    p.x+=p.vx*dt; p.y+=p.vy*dt;
  }
}

function collide(){
  const [a,b]=particles,dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy),minD=P.limitR*2;
  if(dist<minD&&dist>0.01){
    const nx=dx/dist,ny=dy/dist,ov=(minD-dist)*0.5;
    a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;
    const dvn=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
    if(dvn<0){const imp=-(1+P.restitution)*dvn*0.5;a.vx-=imp*nx;a.vy-=imp*ny;b.vx+=imp*nx;b.vy+=imp*ny;}
  }
}

function membranePoints(p,other,phases,t){
  const n=M.nbPts,toOtherAngle=Math.atan2(other.y-p.y,other.x-p.x);
  let leaderJ=0,leaderDiff=Infinity;
  for(let j=0;j<n;j++){
    const ba=(j/n)*Math.PI*2;
    let diff=Math.abs(((ba-toOtherAngle)%(Math.PI*2)+Math.PI*2)%(Math.PI*2));
    if(diff>Math.PI)diff=Math.PI*2-diff;
    if(diff<leaderDiff){leaderDiff=diff;leaderJ=j;}
  }
  const tp=0.55+0.45*Math.sin(t*M.vitesse*0.55+1.2),pts=[];
  for(let j=0;j<n;j++){
    const ba=(j/n)*Math.PI*2,ph=phases[j%phases.length];
    const noise=M.ampli*Math.sin(t*M.vitesse+ph)+M.ampli*0.4*Math.sin(t*M.vitesse*1.618+ph*2.414);
    const bulgeR=M.bulge*Math.max(0,Math.cos(ba-toOtherAngle));
    const cd=Math.min(Math.abs(j-leaderJ),n-Math.abs(j-leaderJ));
    const inf=Math.pow(M.tentacleDecay,cd);
    const tentR=M.tentacleStr*inf*tp;
    const nbN=cd>0?M.tentacleStr*0.18*inf*Math.sin(t*M.vitesse*1.3+ph+cd):0;
    const r=M.memR+noise+bulgeR+tentR+nbN,angle=ba+M.twist*Math.sin(t*M.vitesse*0.7+ph);
    pts.push({x:p.x+Math.cos(angle)*r,y:p.y+Math.sin(angle)*r});
  }
  return pts;
}

function drawSmoothClosed(pts){
  const n=pts.length;if(n<3)return;
  ctx.beginPath();
  ctx.moveTo((pts[n-1].x+pts[0].x)/2,(pts[n-1].y+pts[0].y)/2);
  for(let i=0;i<n;i++){const p=pts[i],nx=pts[(i+1)%n];ctx.quadraticCurveTo(p.x,p.y,(p.x+nx.x)/2,(p.y+nx.y)/2);}
  ctx.closePath();
}

function draw(t){
  ctx.clearRect(0,0,W,H);
  const [a,b]=particles,phaseList=[phases0,phases1];
  ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
  ctx.strokeStyle='rgba(180,90,40,0.07)';ctx.lineWidth=1;ctx.stroke();

  for(let i=0;i<2;i++){
    const p=particles[i],other=particles[1-i],dark=i===0?1:0.88;
    const pts=membranePoints(p,other,phaseList[i],t);

    // L4
    const a4=pts.map(pt=>({x:p.x+(pt.x-p.x)*L4.scale,y:p.y+(pt.y-p.y)*L4.scale}));
    ctx.filter=L4.blur>0?`blur(${L4.blur}px)`:'none';
    drawSmoothClosed(a4);ctx.fillStyle=hexToRgba(L4.color,L4.opacity,dark);ctx.fill();

    // L3
    const a3=pts.map(pt=>({x:p.x+(pt.x-p.x)*L3.scale,y:p.y+(pt.y-p.y)*L3.scale}));
    ctx.filter=L3.blur>0?`blur(${L3.blur}px)`:'none';
    drawSmoothClosed(a3);ctx.fillStyle=hexToRgba(L3.color,L3.opacity,dark);ctx.fill();

    // L2
    ctx.filter=M.blur>0?`blur(${M.blur}px)`:'none';
    drawSmoothClosed(pts);ctx.fillStyle=hexToRgba(M.color,M.opacity,dark);ctx.fill();

    ctx.filter='none';

    // limite debug
    if(P.limitOpacity>0.01){
      ctx.save();ctx.setLineDash([5,5]);ctx.beginPath();ctx.arc(p.x,p.y,P.limitR,0,Math.PI*2);
      ctx.strokeStyle=hexToRgba(P.coreColor,P.limitOpacity);ctx.lineWidth=1;ctx.stroke();ctx.restore();
    }

    // L1 core
    ctx.filter=P.coreBlur>0?`blur(${P.coreBlur}px)`:'none';
    ctx.beginPath();ctx.arc(p.x,p.y,P.coreR,0,Math.PI*2);
    ctx.fillStyle=hexToRgba(P.coreColor,P.coreOpacity,dark);ctx.fill();
    ctx.filter='none';

    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();
  }
}

function loop(ts){
  const dt=lastTs===null?0.016:Math.min((ts-lastTs)/1000,0.05);
  lastTs=ts;elapsed+=dt;physics(dt);collide();draw(elapsed);
  const [a,b]=particles,dx=b.x-a.x,dy=b.y-a.y;
  const info=document.getElementById('fp-info');
  if(info)info.textContent=`dist: ${Math.sqrt(dx*dx+dy*dy).toFixed(0)}px  dom: ${dominance[0].toFixed(2)}/${dominance[1].toFixed(2)}`;
  requestAnimationFrame(loop);
}

// ── Bindings ──────────────────────────────────────────────
function bindSlider(id,valId,obj,key,fmt){
  const s=document.getElementById(id),v=valId?document.getElementById(valId):null;
  if(!s)return;
  if(v)v.textContent=fmt?fmt(obj[key]):obj[key];
  s.addEventListener('input',()=>{
    obj[key]=parseFloat(s.value);
    if(v)v.textContent=fmt?fmt(obj[key]):obj[key];
    if(key==='nbPts'){phases0=buildPhases(M.nbPts);phases1=buildPhases(M.nbPts);}
  });
}
function bindColor(id,obj,key){
  const el=document.getElementById(id);
  if(el)el.addEventListener('input',()=>{obj[key]=el.value;});
}

// ── Fenêtres flottantes ───────────────────────────────────
let zTop = 200;

function initPanels() {
  const panels = document.querySelectorAll('.fp');
  const margin = 12;
  // positions initiales : réparties en haut selon la largeur du viewport
  const count = panels.length;
  const panelW = 14 * 11; // ~154px (14em × 11px font-size)
  const totalW = count * panelW + (count - 1) * margin;
  // on les centre horizontalement si possible, sinon on commence à gauche
  let startX = Math.max(margin, (W - totalW) / 2);

  panels.forEach((panel, idx) => {
    panel.style.left = (startX + idx * (panelW + margin)) + 'px';
    panel.style.top  = margin + 'px';
    panel.style.right = 'auto';
    makeDraggable(panel);
    makeCollapsible(panel);
  });
}

function makeDraggable(panel) {
  const header = panel.querySelector('.fp-header');
  let dragging = false, ox = 0, oy = 0;

  header.addEventListener('mousedown', e => {
    if (e.target.classList.contains('fp-toggle')) return; // laisse le bouton gérer son clic
    dragging = true;
    ox = e.clientX - panel.offsetLeft;
    oy = e.clientY - panel.offsetTop;
    panel.style.zIndex = ++zTop;
    header.classList.add('dragging');
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    let x = e.clientX - ox;
    let y = e.clientY - oy;
    // garde dans la fenêtre
    x = Math.max(0, Math.min(W - panel.offsetWidth, x));
    y = Math.max(0, Math.min(H - 40, y));
    panel.style.left = x + 'px';
    panel.style.top  = y + 'px';
  });

  window.addEventListener('mouseup', () => {
    dragging = false;
    header.classList.remove('dragging');
  });

  // amène au premier plan au clic
  panel.addEventListener('mousedown', () => { panel.style.zIndex = ++zTop; });
}

function makeCollapsible(panel) {
  const btn  = panel.querySelector('.fp-toggle');
  btn.addEventListener('click', () => {
    const collapsed = panel.classList.toggle('collapsed');
    btn.textContent = collapsed ? '▸' : '▾';
    btn.title = collapsed ? 'Développer' : 'Réduire';
  });
}

// init après que le DOM soit prêt et qu'on connaisse W/H
initPanels();
requestAnimationFrame(loop);
