<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAP · Sale</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #c4c0d4; }
    canvas { display: block; }
    .ui {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 10;
    }
    .ui a, .ui button {
      font-family: -apple-system, sans-serif; font-size: 11px;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(255,255,255,0.75); text-decoration: none;
      padding: 6px 14px; border: 1px solid rgba(255,255,255,0.22);
      border-radius: 20px; background: rgba(0,0,0,0.22);
      backdrop-filter: blur(10px); cursor: pointer; transition: background 0.2s;
    }
    .ui a:hover, .ui button:hover { background: rgba(0,0,0,0.38); }
    .label {
      position: fixed; top: 20px; left: 20px;
      font-family: -apple-system, sans-serif; font-size: 11px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.38); z-index: 10; pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="label">GAP · Sale — gris-violet-bleu pâle · contamination orange</div>
  <div class="ui">
    <a href="index.html">← index</a>
    <a href="froid.html">froid</a>
    <a href="creme.html">crème</a>
    <a href="chaud.html">chaud</a>
    <a href="vif.html">vif</a>
    <button onclick="savePNG('gap-sale')">↓ png</button>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="./_gradient.js"></script>
  <script>
    initGradient(document.getElementById('c'), {
      // gris-violet sale pâle (base) · contamination orange terracotta
      color1:   '#b8b4cc',  // gris-violet dirty
      color2:   '#d4d0e4',  // lavande pâle
      color3:   '#de6040',  // orange terracotta (contamination)
      speed:    0.28,
      strength: 1.25,
      grain:    0.04
    })
  </script>
</body>
</html>
