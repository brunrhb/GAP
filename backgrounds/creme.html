<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAP · Crème</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f0ece4; }
    canvas { display: block; }
    .ui {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 10;
    }
    .ui a, .ui button {
      font-family: -apple-system, sans-serif; font-size: 11px;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(0,0,0,0.38); text-decoration: none;
      padding: 6px 14px; border: 1px solid rgba(0,0,0,0.12);
      border-radius: 20px; background: rgba(255,255,255,0.55);
      backdrop-filter: blur(10px); cursor: pointer; transition: background 0.2s;
    }
    .ui a:hover, .ui button:hover { background: rgba(255,255,255,0.8); }
    .label {
      position: fixed; top: 20px; left: 20px;
      font-family: -apple-system, sans-serif; font-size: 11px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(0,0,0,0.22); z-index: 10; pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="label">GAP · Crème — très pâle, papier</div>
  <div class="ui">
    <a href="index.html">← index</a>
    <a href="sale.html">sale</a>
    <a href="froid.html">froid</a>
    <a href="chaud.html">chaud</a>
    <a href="vif.html">vif</a>
    <button onclick="savePNG('gap-creme')">↓ png</button>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="./_gradient.js"></script>
  <script>
    initGradient(document.getElementById('c'), {
      // papier · milky · warm pâle — très doux
      color1:   '#f0ece4',  // paper (GAP)
      color2:   '#e8e5ef',  // milky (GAP)
      color3:   '#f4c4b8',  // warm1 très pâle (GAP)
      speed:    0.18,
      strength: 0.85,
      grain:    0.030
    })
  </script>
</body>
</html>
