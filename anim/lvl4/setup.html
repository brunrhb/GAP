<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAP — Setup lvl4</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background:#0e0d0c;
      color:#f0ece4;
      font-family:monospace;
      font-size:13px;
      overflow:hidden;
      height:100vh;
      display:flex;
      flex-direction:column;
    }

    #top {
      flex-shrink:0;
      background:#0e0d0c;
      border-bottom:1px solid rgba(255,255,255,0.09);
      padding:0.55em 1em;
      display:flex; align-items:center; justify-content:space-between;
    }
    #top h1 { font-size:0.85em; letter-spacing:0.1em; text-transform:uppercase; opacity:0.4; }
    #sync-status { font-size:0.75em; opacity:0.28; }

    #content {
      flex:1;
      overflow-y:auto;
      overflow-x:hidden;
    }

    .panel { border-bottom:1px solid rgba(255,255,255,0.06); }

    .panel-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:0.55em 0.75em;
      cursor:pointer;
      border-left:3px solid transparent;
      user-select:none;
    }
    .panel-header:hover { background:rgba(255,255,255,0.03); }

    .panel-title {
      font-size:0.84em; font-weight:bold;
      letter-spacing:0.06em; text-transform:uppercase;
    }
    .panel-toggle {
      background:none; border:none; color:inherit;
      cursor:pointer; font-size:0.82em; opacity:0.35;
      padding:0; line-height:1;
    }
    .panel-body {
      padding:0.45em 0.75em 0.7em;
      display:flex; flex-direction:column; gap:0.25em;
      overflow:hidden;
      transition:max-height 0.2s ease, opacity 0.15s ease, padding 0.2s ease;
      max-height:120em; opacity:1;
    }
    .panel.collapsed .panel-body {
      max-height:0; opacity:0; padding-top:0; padding-bottom:0;
    }

    #p-rando .panel-header { border-left-color:rgba(80,220,200,0.6); }
    #p-prst  .panel-header { border-left-color:rgba(240,200,48,0.6); }

    #p-rando input[type=range] { accent-color:#50dcc8; }
    #p-prst  input[type=range] { accent-color:#f0c830; }

    .s-label {
      font-size:0.7em; letter-spacing:0.07em; text-transform:uppercase;
      opacity:0.28; margin-top:0.35em; padding-top:0.28em;
      border-top:1px solid rgba(255,255,255,0.06);
    }
    .s-label:first-child { margin-top:0; border-top:none; }

    .row { display:flex; align-items:center; gap:0.3em; }
    .row label { white-space:nowrap; font-size:0.82em; opacity:0.55; flex:0 0 4.8em; }
    input[type=range] { flex:1; cursor:pointer; height:0.8em; min-width:0; }
    .val { width:2.8em; text-align:right; opacity:0.72; font-size:0.82em; flex-shrink:0; }

    /* ── Scènes ─── */
    #p-scenes .panel-header { border-left-color:rgba(180,160,220,0.6); }
    .scene-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.32em; }
    .btn-scene {
      background:rgba(255,255,255,0.04);
      border:1px solid var(--sc,rgba(255,255,255,0.18));
      color:var(--sc,#f0ece4);
      font-family:monospace; font-size:0.82em;
      padding:0.38em 0.4em; border-radius:0.25em; cursor:pointer;
      text-align:center; transition:background 0.12s, box-shadow 0.12s;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .btn-scene:hover {
      background:color-mix(in srgb, var(--sc,#fff) 18%, transparent);
      box-shadow:0 0 0 1px var(--sc,#fff);
    }
    .btn-scene:active { filter:brightness(1.3); }

    /* ── Rando ─── */
    .rando-intensity-row {
      display:flex; align-items:center; gap:0.4em; margin-bottom:0.1em;
    }
    .rando-intensity-row label { font-size:0.82em; opacity:0.5; flex:0 0 auto; }
    .rando-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.28em; }
    .btn-rando {
      background:rgba(80,220,200,0.09); border:1px solid rgba(80,220,200,0.22);
      color:#50dcc8; font-family:monospace; font-size:0.8em;
      padding:0.3em 0.4em; border-radius:0.25em; cursor:pointer;
      text-align:center; transition:background 0.1s;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .btn-rando:hover { background:rgba(80,220,200,0.2); }
    .btn-rando.full { grid-column:1/-1; font-size:0.88em; padding:0.38em; }

    /* ── Presets ─── */
    .preset-save-row {
      display:flex; gap:0.4em; margin-bottom:0.2em;
    }
    .preset-save-row input[type=text] {
      flex:1; background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.14); border-radius:0.25em;
      color:#f0ece4; font-family:monospace; font-size:0.88em;
      padding:0.25em 0.45em; outline:none; min-width:0;
    }
    .preset-save-row input[type=text]:focus { border-color:rgba(240,200,48,0.5); }
    .btn-save {
      background:rgba(240,200,48,0.15); border:1px solid rgba(240,200,48,0.32);
      color:#f0c830; font-family:monospace; font-size:0.82em;
      padding:0.25em 0.6em; border-radius:0.25em; cursor:pointer; flex-shrink:0;
      transition:background 0.1s;
    }
    .btn-save:hover { background:rgba(240,200,48,0.28); }
    #preset-list { display:flex; flex-direction:column; gap:0.25em; }
    #preset-list:empty::before {
      content:'Aucun preset'; opacity:0.25; font-size:0.82em; font-style:italic;
    }
    .preset-entry {
      display:flex; align-items:center; gap:0.3em;
      background:rgba(255,255,255,0.04); border-radius:0.25em; padding:0.25em 0.45em;
    }
    .preset-name { flex:1; font-size:0.85em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; opacity:0.85; }
    .btn-restore {
      background:rgba(240,200,48,0.12); border:1px solid rgba(240,200,48,0.28);
      color:#f0c830; font-family:monospace; font-size:0.74em;
      padding:0.12em 0.45em; border-radius:0.2em; cursor:pointer; flex-shrink:0;
      transition:background 0.1s;
    }
    .btn-restore:hover { background:rgba(240,200,48,0.26); }
    .btn-del {
      background:none; border:none; color:rgba(255,70,50,0.45);
      font-size:0.9em; cursor:pointer; padding:0 0.1em; line-height:1; flex-shrink:0;
      transition:color 0.1s;
    }
    .btn-del:hover { color:rgba(255,70,50,1); }
  </style>
</head>
<body>

<div id="top">
  <h1>GAP — Setup</h1>
  <div id="sync-status">—</div>
</div>

<div id="content">

<!-- ═══ SCÈNES ═══ -->
<div class="panel" id="p-scenes">
  <div class="panel-header">
    <span class="panel-title" style="color:#b0a0d8;">◈ Scènes</span>
    <button class="panel-toggle">▾</button>
  </div>
  <div class="panel-body">
    <div class="scene-grid" id="scene-grid"></div>
  </div>
</div>

<!-- ═══ RANDO ═══ -->
<div class="panel" id="p-rando">
  <div class="panel-header">
    <span class="panel-title" style="color:#50dcc8;">⟳ Rando</span>
    <button class="panel-toggle">▾</button>
  </div>
  <div class="panel-body">
    <div class="rando-intensity-row">
      <label>intensité</label>
      <input type="range" id="rando-intensity" min="0" max="1" step="0.01" value="1">
      <span class="val" id="rando-intensity-val">1.0</span>
    </div>
    <div class="s-label">Tout</div>
    <div class="rando-grid">
      <button class="btn-rando full" data-rando="all">⟳ Tout randomiser</button>
      <button class="btn-rando full" data-rando="colors">⟳ Couleurs seules</button>
    </div>
    <div class="s-label">Par famille</div>
    <div class="rando-grid">
      <button class="btn-rando" data-rando="physics">Physique</button>
      <button class="btn-rando" data-rando="membrane">Membrane</button>
      <button class="btn-rando" data-rando="l3">Niv.3 Aura</button>
      <button class="btn-rando" data-rando="l4">Niv.4 Aura</button>
      <button class="btn-rando" data-rando="l5">Niv.5 Aura</button>
    </div>
    <div class="s-label">Par couche</div>
    <div class="rando-grid">
      <button class="btn-rando" data-rando="l1">Niv.1 Core</button>
      <button class="btn-rando" data-rando="l2">Niv.2 Memb.</button>
      <button class="btn-rando" data-rando="l3layer">Niv.3</button>
      <button class="btn-rando" data-rando="l4layer">Niv.4</button>
      <button class="btn-rando" data-rando="l5layer">Niv.5</button>
    </div>
  </div>
</div>

<!-- ═══ PRESETS ═══ -->
<div class="panel" id="p-prst">
  <div class="panel-header">
    <span class="panel-title" style="color:#f0c830;">⬡ Presets</span>
    <button class="panel-toggle">▾</button>
  </div>
  <div class="panel-body">
    <div class="preset-save-row">
      <input type="text" id="preset-name-input" placeholder="nom du preset…" maxlength="40">
      <button class="btn-save" id="btn-save-preset">Sauver</button>
    </div>
    <div id="preset-list"></div>
  </div>
</div>

</div><!-- /content -->

<script>
/* ── GAP — Setup lvl4
   Maintient des copies locales de P/M/L3/L4/L5 synchronisées depuis gap_lvl4_cfg.
   Rando : modifie objets locaux → écrit gap_lvl4_cfg → params page resync ses sliders.
   Presets : sauvegarde depuis gap_lvl4_cfg courant ; restaure en écrivant gap_lvl4_cfg.
   ──────────────────────────────────────────────────────── */

const CFG_KEY    = 'gap_lvl4_cfg';
const PRESET_PREFIX = 'gap_lvl4_preset__';

// Copies locales — tenues à jour via storage event depuis la page params
const P = {
  attrK:5, fricK:1.0, repK:1500000, curlK:2940, restitution:0.55,
  proxMult:3.5, contourStr:0.65,
  coreR:112, coreColor:'#e87040', coreOpacity:0.88, coreBlur:0,
  limitR:270, limitOpacity:0.22,
};
const M = {
  memR:120, nbPts:10, ampli:18, vitesse:0.6, twist:0.08,
  bulge:35, tentacleStr:50, tentacleDecay:0.4,
  color:'#a0cde6', opacity:0.38, blur:0,
};
const L3 = { scale:1.05, color:'#64c878', opacity:0.22, blur:0, ellipse:0.18 };
const L4 = { scale:1.05, color:'#9b6abf', opacity:0.16, blur:0, ellipse:0.00, compress:0 };
const L5 = { scale:1.05, color:'#d4c840', opacity:0.10, blur:0, ellipse:0.08, compress:0 };
let _switchSpeed = 1.2;

function getConfig(){
  return { P:{...P}, M:{...M}, L3:{...L3}, L4:{...L4}, L5:{...L5}, switchSpeed:_switchSpeed };
}
function broadcast(){
  // Préserve BG depuis le localStorage existant pour ne pas l'écraser
  let existing={};
  try{ const s=localStorage.getItem(CFG_KEY); if(s) existing=JSON.parse(s); }catch(e){}
  const cfg=Object.assign({}, existing, getConfig());
  try{ localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }catch(e){}
  flashSync();
}

// Applique un config reçu sur les objets locaux (sans re-broadcaster)
function absorbConfig(cfg){
  if(cfg.P)  Object.assign(P, cfg.P);
  if(cfg.M)  Object.assign(M, cfg.M);
  if(cfg.L3) Object.assign(L3, cfg.L3);
  if(cfg.L4) Object.assign(L4, cfg.L4);
  if(cfg.L5) Object.assign(L5, cfg.L5);
  if(cfg.switchSpeed!==undefined) _switchSpeed=cfg.switchSpeed;
}

// Charge config initiale
try{ const s=localStorage.getItem(CFG_KEY); if(s) absorbConfig(JSON.parse(s)); }catch(e){}

// Reçoit mises à jour depuis la page params (sliders bougés là-bas)
const syncEl=document.getElementById('sync-status');
let syncTimer=null;
function flashSync(){
  syncEl.textContent='↔ sync'; syncEl.style.opacity='0.6';
  clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>{ syncEl.textContent='—'; syncEl.style.opacity='0.28'; },600);
}
window.addEventListener('storage',e=>{
  if(e.key===CFG_KEY && e.newValue){
    try{ absorbConfig(JSON.parse(e.newValue)); flashSync(); }catch(err){}
  }
});

// ── Scènes ────────────────────────────────────────────────
const SCENES = [
  {
    name: 'Méduse', color: '#6080d0',
    cfg: {
      P: { attrK:4, fricK:0.8, repK:1200000, curlK:2200, restitution:0.4,
           proxMult:4, contourStr:0.5, coreR:55, coreColor:'#3050a0',
           coreOpacity:0.55, coreBlur:12, limitR:300, limitOpacity:0.15 },
      M: { memR:155, nbPts:14, ampli:38, vitesse:1.0, twist:0.12,
           bulge:18, tentacleStr:85, tentacleDecay:0.22,
           color:'#6080c8', opacity:0.28, blur:5 },
      L3: { scale:1.5,  color:'#80a8e8', opacity:0.18, blur:14, ellipse:0.55 },
      L4: { scale:2.2,  color:'#a060c0', opacity:0.11, blur:26, ellipse:0.75, compress:0.08 },
      L5: { scale:3.5,  color:'#40b8c0', opacity:0.05, blur:48, ellipse:0.85, compress:0.0 },
      switchSpeed: 1.6,
    }
  },
  {
    name: 'Soleil', color: '#ff8030',
    cfg: {
      P: { attrK:8, fricK:1.2, repK:1600000, curlK:1800, restitution:0.5,
           proxMult:3, contourStr:0.4, coreR:135, coreColor:'#ff5010',
           coreOpacity:0.92, coreBlur:18, limitR:280, limitOpacity:0.1 },
      M: { memR:145, nbPts:8, ampli:20, vitesse:0.35, twist:0.03,
           bulge:70, tentacleStr:15, tentacleDecay:0.55,
           color:'#ff8030', opacity:0.45, blur:10 },
      L3: { scale:1.3,  color:'#ffa030', opacity:0.28, blur:22, ellipse:0.04 },
      L4: { scale:1.9,  color:'#ff4010', opacity:0.15, blur:40, ellipse:0.03, compress:0 },
      L5: { scale:2.8,  color:'#ffd020', opacity:0.07, blur:65, ellipse:0.02, compress:0 },
      switchSpeed: 0.7,
    }
  },
  {
    name: 'Cellule', color: '#60c870',
    cfg: {
      P: { attrK:4, fricK:3.5, repK:1400000, curlK:1500, restitution:0.3,
           proxMult:3, contourStr:0.7, coreR:75, coreColor:'#40b050',
           coreOpacity:0.8, coreBlur:0, limitR:240, limitOpacity:0.2 },
      M: { memR:125, nbPts:18, ampli:32, vitesse:1.8, twist:0.18,
           bulge:50, tentacleStr:70, tentacleDecay:0.3,
           color:'#70d080', opacity:0.44, blur:2 },
      L3: { scale:1.18, color:'#40b855', opacity:0.30, blur:4,  ellipse:0.28 },
      L4: { scale:1.42, color:'#289048', opacity:0.20, blur:9,  ellipse:0.32, compress:0.12 },
      L5: { scale:1.72, color:'#186838', opacity:0.10, blur:16, ellipse:0.38, compress:0.18 },
      switchSpeed: 2.2,
    }
  },
  {
    name: 'Fantôme', color: '#b8b4ac',
    cfg: {
      P: { attrK:3, fricK:0.5, repK:900000, curlK:2400, restitution:0.65,
           proxMult:4.5, contourStr:0.3, coreR:88, coreColor:'#e0dcd4',
           coreOpacity:0.28, coreBlur:28, limitR:300, limitOpacity:0.1 },
      M: { memR:138, nbPts:10, ampli:38, vitesse:0.45, twist:0.06,
           bulge:28, tentacleStr:42, tentacleDecay:0.42,
           color:'#d0ccc4', opacity:0.18, blur:18 },
      L3: { scale:1.6,  color:'#e8e4dc', opacity:0.10, blur:32, ellipse:0.14 },
      L4: { scale:2.4,  color:'#f0ece4', opacity:0.06, blur:50, ellipse:0.18, compress:0 },
      L5: { scale:3.8,  color:'#ffffff', opacity:0.03, blur:75, ellipse:0.08, compress:0 },
      switchSpeed: 0.9,
    }
  },
  {
    name: 'Magnétique', color: '#ff40a0',
    cfg: {
      P: { attrK:9, fricK:0.6, repK:2000000, curlK:2940, restitution:0.65,
           proxMult:3, contourStr:0.75, coreR:95, coreColor:'#c03070',
           coreOpacity:0.88, coreBlur:0, limitR:260, limitOpacity:0.25 },
      M: { memR:108, nbPts:8, ampli:12, vitesse:0.9, twist:0.05,
           bulge:55, tentacleStr:28, tentacleDecay:0.48,
           color:'#c03070', opacity:0.52, blur:0 },
      L3: { scale:1.35, color:'#4080ff', opacity:0.28, blur:6,  ellipse:0.72 },
      L4: { scale:2.0,  color:'#40c8ff', opacity:0.18, blur:14, ellipse:0.95, compress:0.28 },
      L5: { scale:3.0,  color:'#80ff80', opacity:0.09, blur:28, ellipse:1.1,  compress:0.4 },
      switchSpeed: 0.5,
    }
  },
  {
    name: 'Nébuleuse', color: '#a060e0',
    cfg: {
      P: { attrK:5, fricK:0.9, repK:1300000, curlK:2600, restitution:0.5,
           proxMult:3.5, contourStr:0.55, coreR:68, coreColor:'#7030b8',
           coreOpacity:0.72, coreBlur:12, limitR:290, limitOpacity:0.15 },
      M: { memR:118, nbPts:12, ampli:24, vitesse:0.28, twist:0.1,
           bulge:22, tentacleStr:38, tentacleDecay:0.5,
           color:'#c060e0', opacity:0.32, blur:7 },
      L3: { scale:1.7,  color:'#40b8ff', opacity:0.18, blur:22, ellipse:0.35 },
      L4: { scale:2.6,  color:'#ff40a0', opacity:0.11, blur:42, ellipse:0.52, compress:0.12 },
      L5: { scale:4.2,  color:'#4040e8', opacity:0.05, blur:75, ellipse:0.65, compress:0.22 },
      switchSpeed: 1.1,
    }
  },
];

(function buildScenes(){
  const grid = document.getElementById('scene-grid');
  SCENES.forEach(scene => {
    const btn = document.createElement('button');
    btn.className = 'btn-scene';
    btn.textContent = scene.name;
    btn.style.setProperty('--sc', scene.color);
    btn.addEventListener('click', () => {
      absorbConfig(scene.cfg);
      broadcast();
    });
    grid.appendChild(btn);
  });
})();

// ── Rando ─────────────────────────────────────────────────
const RANDO_PHYSICS=[
  {obj:P,key:'attrK',min:1,max:15},{obj:P,key:'fricK',min:0.2,max:6},
  {obj:P,key:'repK',min:300000,max:4500000,int:true},{obj:P,key:'curlK',min:200,max:3000,int:true},
  {obj:P,key:'restitution',min:0.05,max:0.95},{obj:P,key:'proxMult',min:1.5,max:7},
  {obj:P,key:'contourStr',min:0,max:1},{obj:null,key:'switchSpeed',min:0.2,max:4},
];
const RANDO_CORE=[
  {obj:P,key:'coreR',min:40,max:220,int:true},{obj:P,key:'coreOpacity',min:0.3,max:1},
  {obj:P,key:'coreBlur',min:0,max:20},{obj:P,key:'coreColor',color:true},
  {obj:P,key:'limitR',min:80,max:380,int:true},{obj:P,key:'limitOpacity',min:0,max:0.5},
];
const RANDO_MEM_SHAPE=[
  {obj:M,key:'memR',min:60,max:320,int:true},{obj:M,key:'nbPts',min:4,max:22,int:true},
  {obj:M,key:'ampli',min:2,max:70,int:true},{obj:M,key:'vitesse',min:0.05,max:2.5},
  {obj:M,key:'twist',min:0,max:0.45},{obj:M,key:'bulge',min:0,max:100,int:true},
  {obj:M,key:'tentacleStr',min:0,max:110,int:true},{obj:M,key:'tentacleDecay',min:0.05,max:0.9},
];
const RANDO_MEM_LOOK=[
  {obj:M,key:'color',color:true},{obj:M,key:'opacity',min:0.1,max:0.85},{obj:M,key:'blur',min:0,max:25},
];
const RANDO_L3=[
  {obj:L3,key:'scale',min:1.05,max:2.2},{obj:L3,key:'ellipse',min:0,max:1.0},
  {obj:L3,key:'color',color:true},{obj:L3,key:'opacity',min:0.05,max:0.55},{obj:L3,key:'blur',min:0,max:35},
];
const RANDO_L4=[
  {obj:L4,key:'scale',min:1.3,max:3.2},{obj:L4,key:'ellipse',min:0,max:1.1},
  {obj:L4,key:'compress',min:0,max:1.1},
  {obj:L4,key:'color',color:true},{obj:L4,key:'opacity',min:0.04,max:0.45},{obj:L4,key:'blur',min:0,max:60},
];
const RANDO_L5=[
  {obj:L5,key:'scale',min:1.8,max:5.0},{obj:L5,key:'ellipse',min:0,max:1.2},
  {obj:L5,key:'compress',min:0,max:1.2},
  {obj:L5,key:'color',color:true},{obj:L5,key:'opacity',min:0.03,max:0.35},{obj:L5,key:'blur',min:0,max:80},
];
const RANDO_GROUPS={
  all:[...RANDO_PHYSICS,...RANDO_CORE,...RANDO_MEM_SHAPE,...RANDO_MEM_LOOK,...RANDO_L3,...RANDO_L4,...RANDO_L5],
  colors:[{obj:P,key:'coreColor',color:true},{obj:M,key:'color',color:true},{obj:L3,key:'color',color:true},{obj:L4,key:'color',color:true},{obj:L5,key:'color',color:true}],
  physics:[...RANDO_PHYSICS],
  membrane:[...RANDO_MEM_SHAPE,...RANDO_MEM_LOOK],
  l3:[...RANDO_L3], l4:[...RANDO_L4], l5:[...RANDO_L5],
  l1:[...RANDO_CORE], l2:[...RANDO_MEM_SHAPE,...RANDO_MEM_LOOK],
  l3layer:[...RANDO_L3], l4layer:[...RANDO_L4], l5layer:[...RANDO_L5],
};

function randHex(){ return '#'+[0,0,0].map(()=>Math.floor(Math.random()*256).toString(16).padStart(2,'0')).join(''); }
function randParam(spec,intensity){
  if(spec.color){
    const cur=spec.obj[spec.key]||'#888888', rh=randHex();
    if(intensity>=0.99){ spec.obj[spec.key]=rh; return; }
    const pr=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
    const [cr,cg,cb]=pr(cur),[rr,rg,rb]=pr(rh);
    const lp=(a,b,t)=>Math.round(a+(b-a)*t);
    spec.obj[spec.key]='#'+[lp(cr,rr,intensity),lp(cg,rg,intensity),lp(cb,rb,intensity)].map(v=>v.toString(16).padStart(2,'0')).join('');
  } else {
    const cur=spec.obj?spec.obj[spec.key]:_switchSpeed;
    let val=cur+(spec.min+Math.random()*(spec.max-spec.min)-cur)*intensity;
    if(spec.int) val=Math.round(val);
    val=Math.min(spec.max,Math.max(spec.min,val));
    if(spec.obj) spec.obj[spec.key]=val; else _switchSpeed=val;
  }
}
function applyRando(specs){
  const intensity=parseFloat(document.getElementById('rando-intensity').value);
  specs.forEach(s=>randParam(s,intensity));
  broadcast(); // envoie aux autres pages via gap_lvl4_cfg
}

document.querySelectorAll('[data-rando]').forEach(btn=>{
  btn.addEventListener('click',()=>{ const g=RANDO_GROUPS[btn.dataset.rando]; if(g) applyRando(g); });
});
const riEl=document.getElementById('rando-intensity');
const rvEl=document.getElementById('rando-intensity-val');
riEl.addEventListener('input',()=>{ rvEl.textContent=parseFloat(riEl.value).toFixed(2); });

// ── Presets ───────────────────────────────────────────────
function listPresets(){
  const names=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k.startsWith(PRESET_PREFIX)) names.push(k.slice(PRESET_PREFIX.length));
  }
  return names.sort();
}
function renderPresets(){
  const list=document.getElementById('preset-list');
  list.innerHTML='';
  listPresets().forEach(name=>{
    const entry=document.createElement('div');
    entry.className='preset-entry';
    entry.innerHTML=`<span class="preset-name" title="${name}">${name}</span><button class="btn-restore">Restaurer</button><button class="btn-del" title="Supprimer">✕</button>`;
    entry.querySelector('.btn-restore').addEventListener('click',()=>{
      try{
        const cfg=JSON.parse(localStorage.getItem(PRESET_PREFIX+name));
        absorbConfig(cfg);
        broadcast(); // → params page + animation reçoivent
      }catch(err){}
    });
    entry.querySelector('.btn-del').addEventListener('click',()=>{
      localStorage.removeItem(PRESET_PREFIX+name); renderPresets();
    });
    list.appendChild(entry);
  });
}

document.getElementById('btn-save-preset').addEventListener('click',()=>{
  const input=document.getElementById('preset-name-input');
  const name=input.value.trim(); if(!name) return;
  // Sauvegarde le config courant (objets locaux = last known state)
  localStorage.setItem(PRESET_PREFIX+name, JSON.stringify(getConfig()));
  input.value=''; renderPresets();
});
document.getElementById('preset-name-input').addEventListener('keydown',e=>{
  if(e.key==='Enter') document.getElementById('btn-save-preset').click();
});
renderPresets();

// ── Collapse panels ───────────────────────────────────────
document.querySelectorAll('.panel-header').forEach(header=>{
  header.addEventListener('click',()=>{
    const panel=header.closest('.panel');
    const btn=header.querySelector('.panel-toggle');
    btn.textContent=panel.classList.toggle('collapsed')?'▸':'▾';
  });
});
</script>
