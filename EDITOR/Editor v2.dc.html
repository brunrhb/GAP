<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://use.typekit.net/scu0dna.css">
<script src="preset-store.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: #B8B8B8;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #1a1a1a;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  *, *::before, *::after { box-sizing: border-box; }
  .v2-frame { position: absolute; box-sizing: border-box; }
  .v2-frame-content {
    width: 100%;
    height: 100%;
    padding: 8px 10px;
    background: rgba(255,255,255,0.0);
    border: 1px dashed rgba(0,0,0,0.25);
    font-family: inherit;
    font-size: 16px;
    line-height: 1.4;
    color: #1a1a1a;
    outline: none;
    resize: none;
    overflow: hidden;
    -webkit-user-select: text;
    cursor: text;
    transition: border-color 0.12s;
  }
  .v2-frame[data-selected="true"] .v2-frame-content {
    border: 1px solid #2D7CF0;
    box-shadow: 0 0 0 1px rgba(45,124,240,0.18), 0 6px 20px -8px rgba(0,0,0,0.15);
  }
  .v2-frame[data-selected="false"] .v2-frame-content:hover {
    border-color: rgba(0,0,0,0.45);
  }
  .v2-frame-drag {
    position: absolute;
    top: -28px; left: -1px; right: -1px;
    height: 24px;
    background: rgba(0,0,0,0);
    cursor: move;
    display: flex;
    align-items: center;
    padding: 0 6px;
    font-size: 10px;
    color: rgba(0,0,0,0.4);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.12s;
  }
  .v2-frame[data-selected="true"] .v2-frame-drag,
  .v2-frame:hover .v2-frame-drag { opacity: 1; }
  .v2-frame-handle {
    position: absolute;
    right: -5px; bottom: -5px;
    width: 12px; height: 12px;
    background: #fff;
    border: 1px solid #2D7CF0;
    cursor: nwse-resize;
    opacity: 0;
  }
  .v2-frame[data-selected="true"] .v2-frame-handle { opacity: 1; }
  .v2-frame-handle-l, .v2-frame-handle-r, .v2-frame-handle-t, .v2-frame-handle-b {
    position: absolute;
    background: #fff;
    border: 1px solid #2D7CF0;
    opacity: 0;
  }
  .v2-frame[data-selected="true"] .v2-frame-handle-l,
  .v2-frame[data-selected="true"] .v2-frame-handle-r,
  .v2-frame[data-selected="true"] .v2-frame-handle-t,
  .v2-frame[data-selected="true"] .v2-frame-handle-b { opacity: 1; }
  .v2-frame-handle-l { left: -4px; top: 50%; width: 8px; height: 8px; margin-top: -4px; cursor: ew-resize; }
  .v2-frame-handle-r { right: -4px; top: 50%; width: 8px; height: 8px; margin-top: -4px; cursor: ew-resize; }
  .v2-frame-handle-t { left: 50%; top: -4px; width: 8px; height: 8px; margin-left: -4px; cursor: ns-resize; }
  .v2-frame-handle-b { left: 50%; bottom: -4px; width: 8px; height: 8px; margin-left: -4px; cursor: ns-resize; }

  /* contenteditable paragraph */
  div.v2-editable {
    width: 100%; height: 100%;
    padding: 8px 10px;
    background: transparent;
    border: 1px dashed rgba(0,0,0,0.25);
    font-size: 16px; line-height: 1.4; color: #1a1a1a;
    outline: none; overflow: visible;
    cursor: text;
    white-space: pre-wrap; word-break: break-word;
    box-sizing: border-box;
    transition: border-color 0.12s;
    -webkit-user-select: text;
  }
  .v2-frame[data-selected="true"] div.v2-editable {
    border: 1px solid #2D7CF0;
    box-shadow: 0 0 0 1px rgba(45,124,240,0.18), 0 6px 20px -8px rgba(0,0,0,0.15);
  }
  .v2-frame[data-selected="false"] div.v2-editable:hover { border-color: rgba(0,0,0,0.45); }
  div.v2-editable:empty::before {
    content: attr(data-placeholder);
    color: rgba(0,0,0,0.28);
    pointer-events: none;
    display: block;
  }
  /* inline A-pont */
  .v2-inline-bridge {
    display: inline-block;
    position: relative;
    vertical-align: baseline;
    cursor: default;
    user-select: none; -webkit-user-select: none;
  }
  .v2-bridge-ext-handle {
    position: absolute;
    right: -3px; top: 15%; height: 70%; width: 7px;
    background: #2D7CF0; border-radius: 2px;
    cursor: ew-resize; opacity: 0;
    transition: opacity 0.15s;
  }
  .v2-inline-bridge:hover .v2-bridge-ext-handle { opacity: 0.85; }

  /* move handle (mobile drag affordance) */
  .v2-move-handle {
    position: absolute;
    top: -36px; left: 50%; transform: translateX(-50%);
    width: 44px; height: 32px;
    background: #1a1a1a;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: grab; touch-action: none;
    opacity: 0; transition: opacity 0.15s;
    pointer-events: none;
    z-index: 10;
  }
  .v2-frame[data-selected="true"] .v2-move-handle {
    opacity: 1; pointer-events: auto;
  }
  .v2-move-handle:active { cursor: grabbing; background: #333; }

  /* ── RESPONSIVE ── */

  /* Small desktop ≤ 1100px: slim the right panel */
  .v2-right-panel.is-collapsed { width: 42px !important; }

  /* Tablet / large phone landscape ≤ 820px:
     panel becomes a horizontal bottom bar */
  @media (max-width: 820px) {
    .v2-body { flex-direction: column !important; }
    .v2-canvas-area { flex: 1 !important; min-height: 0 !important; }
    .v2-right-panel {
      position: static !important;
      inset: auto !important;
      box-shadow: none !important;
      width: 100% !important;
      height: 160px !important;
      flex-direction: row !important;
      border-left: none !important;
      border-top: 1px solid rgba(0,0,0,0.12) !important;
      flex-shrink: 0 !important;
      overflow: hidden !important;
    }
    .v2-tab-strip {
      flex-direction: column !important;
      border-bottom: none !important;
      border-right: 1px solid rgba(0,0,0,0.10) !important;
      width: 44px !important;
      flex-shrink: 0 !important;
      height: 100% !important;
      overflow: hidden !important;
    }
    .v2-tab-strip button {
      writing-mode: vertical-rl !important;
      text-orientation: mixed !important;
      height: 50% !important;
      width: 44px !important;
      padding: 8px 4px !important;
      border-bottom: none !important;
      border-right: 2px solid transparent !important;
      margin: 0 !important;
    }
    .v2-panel-scroll {
      flex: 1 !important;
      overflow-x: auto !important;
      overflow-y: hidden !important;
      height: 160px !important;
      display: flex !important;
      flex-direction: row !important;
      align-items: flex-start !important;
      padding: 10px 12px !important;
      gap: 16px !important;
      -webkit-overflow-scrolling: touch !important;
      scrollbar-width: none !important;
    }
    .v2-panel-scroll::-webkit-scrollbar { display: none; }
    .v2-panel-scroll > div { flex-shrink: 0 !important; }
  }

  /* Phone portrait ≤ 500px */
  @media (max-width: 500px) {
    .v2-toolbar { flex-wrap: wrap !important; gap: 4px !important; padding: 6px 8px !important; }
    .v2-toolbar .v2-hide-mobile { display: none !important; }
    .v2-right-panel { height: 140px !important; }
    .v2-panel-scroll { height: 140px !important; }
  }
</style>
</helmet>

<div style="position: fixed; inset: 0; display: flex; flex-direction: column; background: #B8B8B8; font-size: 13px;">

  <!-- toolbar -->
  <div class="v2-toolbar" style="display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: rgba(255,255,255,0.55); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(0,0,0,0.08); flex-shrink: 0;">
    <button onClick="{{ addParagraph }}" style="display: inline-flex; align-items: center; gap: 6px; padding: 0 12px; height: 28px; border: 1px solid rgba(0,0,0,0.15); background: #fff; color: #1a1a1a; font-size: 12px; font-family: inherit; cursor: pointer; border-radius: 3px;">
      <span style="font-size: 14px; line-height: 1;">+</span>
      Paragraph
    </button>
    <div style="width: 1px; height: 18px; background: rgba(0,0,0,0.12);"></div>

    <!-- format selector -->
    <select value="{{ format }}" onChange="{{ onFormatChange }}" style="height: 28px; padding: 0 24px 0 8px; border: 1px solid rgba(0,0,0,0.15); background: #fff; color: #1a1a1a; font-size: 12px; font-family: inherit; cursor: pointer; border-radius: 3px; outline: none; appearance: none; -webkit-appearance: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2210%22 height=%226%22 viewBox=%220 0 10 6%22><path d=%22M0 0l5 6 5-6z%22 fill=%22%23888%22/></svg>'); background-repeat: no-repeat; background-position: right 8px center;">
      <option value="ig-post">IG Post · 4:5</option>
      <option value="ig-square">IG Carré · 1:1</option>
      <option value="ig-story">Story · 9:16</option>
      <option value="li-post">LinkedIn · 1.9:1</option>
      <option value="li-portrait">LI Portrait · 4:5</option>
      <option value="affiche-a4">Affiche A4</option>
      <option value="affiche-a3">Affiche A3</option>
      <option value="affiche-land">A3 Paysage</option>
      <option value="carre-40">Carré 40×40 cm</option>
    </select>

    <div style="width: 1px; height: 18px; background: rgba(0,0,0,0.12);"></div>
    <span class="v2-hide-mobile" style="font-size: 11px; color: rgba(0,0,0,0.5);">{{ frameCount }} frame(s)</span>

    <sc-if value="{{ hasSafeZone }}" hint-placeholder-val="{{ false }}">
      <div style="width: 1px; height: 18px; background: rgba(0,0,0,0.12);"></div>
      <button onClick="{{ toggleSafeZone }}" style="display: inline-flex; align-items: center; gap: 5px; padding: 0 10px; height: 28px; border: 1px solid rgba(0,0,0,0.15); background: {{ showSafeZone ? '#1a1a1a' : '#fff' }}; color: {{ showSafeZone ? '#fff' : '#1a1a1a' }}; font-size: 11px; font-family: inherit; cursor: pointer; border-radius: 3px; letter-spacing: 0.04em;">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.3">
          <rect x="1" y="1" width="8" height="8" rx="1" stroke-dasharray="2 1.5"/>
        </svg>
        Safe zone
      </button>
    </sc-if>
    <div style="flex: 1;"></div>
    {{ templatesBar }}
    <button onClick="{{ openCleanView }}" style="display: inline-flex; align-items: center; gap: 5px; padding: 0 12px; height: 28px; border: none; background: #1a1a1a; color: #fff; font-size: 11px; font-family: inherit; cursor: pointer; border-radius: 3px; letter-spacing: 0.05em; font-weight: 500; flex-shrink: 0;">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="2.5" width="10" height="7.5" rx="1"/><circle cx="6" cy="6.2" r="1.8"/></svg>
      Exporter
    </button>
  </div>

  {{ cleanOverlay }}
  {{ templatesManager }}

  <!-- body: canvas + right panel -->
  <div class="v2-body" style="flex: 1; min-height: 0; display: flex; position: relative;">

    <!-- canvas (full bleed gray) -->
    <div ref="{{ canvasRef }}" onMouseDown="{{ deselectAll }}" onMouseMove="{{ onCanvasMouseMove }}" class="v2-canvas-area" style="flex: 1; min-height: 0; position: relative; overflow: hidden; cursor: default;">
      {{ framesMount }}
      {{ auraToast }}
      {{ bridgeAnimPanel }}
    </div>

    <!-- right panel: TYPE + FONDS tabs -->
    <div class="v2-right-panel {{ panelCollapsedClass }}" style="position: relative; width: {{ panelWidth }}; flex-shrink: 0; background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border-left: 1px solid rgba(0,0,0,0.10); z-index: 20; display: flex; flex-direction: column;">

      <!-- collapse / expand toggle -->
      <button onClick="{{ togglePanel }}" title="{{ panelToggleTitle }}" style="position: absolute; top: 7px; left: 7px; z-index: 40; width: 26px; height: 26px; border: 1px solid rgba(0,0,0,0.12); background: rgba(255,255,255,0.9); color: #1a1a1a; font-size: 15px; line-height: 1; cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: center; padding: 0;">{{ panelToggleIcon }}</button>

      <!-- width cycle -->
      <button onClick="{{ cyclePanelWidth }}" title="Élargir le panneau" style="position: absolute; top: 7px; left: 38px; z-index: 40; width: 26px; height: 26px; border: 1px solid rgba(0,0,0,0.12); background: rgba(255,255,255,0.9); color: #1a1a1a; font-size: 10px; font-weight: 600; line-height: 1; cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: center; padding: 0;">{{ panelWidthLabel }}</button>

      <!-- inner content (hidden when collapsed) -->
      <div style="display: {{ panelInnerDisplay }}; flex: 1; min-height: 0; flex-direction: column; width: 100%;">

      <!-- tab strip -->
      <div class="v2-tab-strip" style="display: flex; border-bottom: 1px solid rgba(0,0,0,0.10); flex-shrink: 0; padding-left: 70px;">
        <button onClick="{{ showTypePanel }}" style="flex: 1; padding: 10px 4px 8px; border: none; background: transparent; font-size: 10px; font-weight: 500; font-family: inherit; cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; color: {{ typePanelFg }}; border-bottom: 2px solid {{ typePanelBorder }}; margin-bottom: -1px;">Type</button>
        <button onClick="{{ showFondsPanel }}" style="flex: 1; padding: 10px 4px 8px; border: none; background: transparent; font-size: 10px; font-weight: 500; font-family: inherit; cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; color: {{ fondsPanelFg }}; border-bottom: 2px solid {{ fondsPanelBorder }}; margin-bottom: -1px;">Back</button>
        <button onClick="{{ showLayersPanel }}" style="flex: 1; padding: 10px 4px 8px; border: none; background: transparent; font-size: 10px; font-weight: 500; font-family: inherit; cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; color: {{ layersPanelFg }}; border-bottom: 2px solid {{ layersPanelBorder }}; margin-bottom: -1px;">Layer</button>
      </div>

    <div class="v2-panel-scroll" style="flex: 1; overflow-y: auto; padding: 14px 12px 20px;">
      <div style="display: {{ typePanelDisplay }};">

      <!-- ═══ A-PONT — top, illustrated ═══ -->
      <div style="margin-bottom: 16px;">
        <div style="font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(0,0,0,0.4); margin-bottom: 8px;">A Pont</div>

        <!-- big visual A bridge — click to insert when a Main font is active -->
        <button onClick="{{ insertInlineA }}" title="Insérer au curseur" style="display: block; width: 100%; position: relative; height: 40px; background: #1a1a1a; border: none; border-radius: 4px; overflow: hidden; cursor: pointer; padding: 0;">
          <img src="uploads/a-pont-icon-white.png" alt="A pont" style="height: 18px; width: auto; display: block; margin: 0 auto;" />
        </button>
      </div>
      <!-- ═══ /A-PONT ═══ -->

      <div style="font-size: 9px; letter-spacing: 0.10em; text-transform: uppercase; color: rgba(0,0,0,0.3); margin-bottom: 6px; padding-top: 12px; border-top: 1px solid rgba(0,0,0,0.08);">Display</div>

      <!-- Main1 chip -->
      <button onClick="{{ applyMain1 }}" style="display: block; width: 100%; padding: 8px 10px 6px; margin-bottom: 5px; border: {{ main1Border }}; background: {{ main1Bg }}; border-radius: 3px; cursor: pointer; text-align: left; overflow: hidden;">
        <div style="font-family: 'obviously-variable', sans-serif; font-variation-settings: 'ital' 0, 'wght' 803, 'wdth' 121; font-size: 19px; line-height: 1; color: #1a1a1a; transform: scaleY(0.88); transform-origin: bottom left; display: block;">MAIN 1</div>
      </button>

      <!-- Main2 chip -->
      <button onClick="{{ applyMain2 }}" style="display: block; width: 100%; padding: 8px 10px 6px; margin-bottom: 5px; border: {{ main2Border }}; background: {{ main2Bg }}; border-radius: 3px; cursor: pointer; text-align: left; overflow: hidden;">
        <div style="font-family: 'obviously-variable', sans-serif; font-variation-settings: 'ital' 0, 'wght' 699, 'wdth' 121; font-size: 19px; line-height: 1; color: #1a1a1a; transform: scaleY(0.88); transform-origin: bottom left; display: block;">MAIN 2</div>
      </button>

      <!-- group label: Corps -->
      <div style="font-size: 9px; letter-spacing: 0.10em; text-transform: uppercase; color: rgba(0,0,0,0.3); margin-top: 11px; margin-bottom: 6px;">Corps</div>

      <!-- Corps 3 — Gras -->
      <button onClick="{{ applyCorps3 }}" style="display: block; width: 100%; padding: 7px 10px; margin-bottom: 5px; border: {{ corps3Border }}; background: {{ corps3Bg }}; border-radius: 3px; cursor: pointer; text-align: left; overflow: hidden;">
        <div style="font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; font-weight: 700; font-size: 16px; line-height: 1.1; color: #1a1a1a;">Corps Gras</div>
      </button>

      <!-- Corps 2 — Regular -->
      <button onClick="{{ applyCorps2 }}" style="display: block; width: 100%; padding: 7px 10px; margin-bottom: 5px; border: {{ corps2Border }}; background: {{ corps2Bg }}; border-radius: 3px; cursor: pointer; text-align: left; overflow: hidden;">
        <div style="font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif; font-weight: 400; font-size: 16px; line-height: 1.1; color: #1a1a1a;">Corps</div>
      </button>

      <!-- Corps 1 — Fin -->
      <button onClick="{{ applyCorps1 }}" style="display: block; width: 100%; padding: 7px 10px; margin-bottom: 5px; border: {{ corps1Border }}; background: {{ corps1Bg }}; border-radius: 3px; cursor: pointer; text-align: left; overflow: hidden;">
        <div style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 300; font-size: 16px; line-height: 1.1; color: #1a1a1a;">Corps Fin</div>
      </button>

      <!-- TAILLE -->
      <div style="margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(0,0,0,0.08);">
        <div style="font-size: 9px; letter-spacing: 0.10em; text-transform: uppercase; color: rgba(0,0,0,0.3); margin-bottom: 10px;">Taille</div>

        <!-- size presets: 3 groups -->
        <div style="display: grid; gap: 6px; margin-bottom: 10px;">

          <!-- Grand -->
          <div style="display: grid; grid-template-columns: 24px 1fr 1fr 1fr; align-items: center; gap: 4px;">
            <span style="font-size: 9px; color: rgba(0,0,0,0.28); letter-spacing: 0.06em;">G</span>
            <button onClick="{{ setSize72 }}" style="padding: 5px 0; border: {{ sz72Border }}; background: {{ sz72Bg }}; border-radius: 3px; cursor: pointer; font-size: 10px; font-family: inherit; color: #1a1a1a; text-align: center;">72</button>
            <button onClick="{{ setSize96 }}" style="padding: 5px 0; border: {{ sz96Border }}; background: {{ sz96Bg }}; border-radius: 3px; cursor: pointer; font-size: 10px; font-family: inherit; color: #1a1a1a; text-align: center;">96</button>
            <button onClick="{{ setSize128 }}" style="padding: 5px 0; border: {{ sz128Border }}; background: {{ sz128Bg }}; border-radius: 3px; cursor: pointer; font-size: 10px; font-family: inherit; color: #1a1a1a; text-align: center;">128</button>
          </div>

          <!-- separator jump -->
          <div style="height: 1px; background: rgba(0,0,0,0.06); margin: 0 24px;"></div>

          <!-- Moyen -->
          <div style="display: grid; grid-template-columns: 24px 1fr 1fr 1fr; align-items: center; gap: 4px;">
            <span style="font-size: 9px; color: rgba(0,0,0,0.28); letter-spacing: 0.06em;">M</span>
            <button onClick="{{ setSize28 }}" style="padding: 5px 0; border: {{ sz28Border }}; background: {{ sz28Bg }}; border-radius: 3px; cursor: pointer; font-size: 10px; font-family: inherit; color: #1a1a1a; text-align: center;">28</button>
            <button onClick="{{ setSize36 }}" style="padding: 5px 0; border: {{ sz36Border }}; background: {{ sz36Bg }}; border-radius: 3px; cursor: pointer; font-size: 10px; font-family: inherit; color: #1a1a1a; text-align: center;">36</button>
            <button onClick="{{ setSize48 }}" style="padding: 5px 0; border: {{ sz48Border }}; background: {{ sz48Bg }}; border-radius: 3px; cursor: pointer; font-size: 10px; font-family: inherit; color: #1a1a1a; text-align: center;">48</button>
          </div>

          <!-- separator jump -->
          <div style="height: 1px; background: rgba(0,0,0,0.06); margin: 0 24px;"></div>

          <!-- Petit -->
          <div style="display: grid; grid-template-columns: 24px 1fr 1fr 1fr; align-items: center; gap: 4px;">
            <span style="font-size: 9px; color: rgba(0,0,0,0.28); letter-spacing: 0.06em;">P</span>
            <button onClick="{{ setSize11 }}" style="padding: 5px 0; border: {{ sz11Border }}; background: {{ sz11Bg }}; border-radius: 3px; cursor: pointer; font-size: 10px; font-family: inherit; color: #1a1a1a; text-align: center;">11</button>
            <button onClick="{{ setSize14 }}" style="padding: 5px 0; border: {{ sz14Border }}; background: {{ sz14Bg }}; border-radius: 3px; cursor: pointer; font-size: 10px; font-family: inherit; color: #1a1a1a; text-align: center;">14</button>
            <button onClick="{{ setSize18 }}" style="padding: 5px 0; border: {{ sz18Border }}; background: {{ sz18Bg }}; border-radius: 3px; cursor: pointer; font-size: 10px; font-family: inherit; color: #1a1a1a; text-align: center;">18</button>
          </div>

        </div>
      </div>

      <!-- COULEUR -->
      <div style="margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(0,0,0,0.08);">
        <div style="font-size: 9px; letter-spacing: 0.10em; text-transform: uppercase; color: rgba(0,0,0,0.3); margin-bottom: 10px;">Couleur</div>

        <!-- noir / blanc toggle -->
        <div style="display: flex; gap: 6px; margin-bottom: 10px;">
          <button onClick="{{ setBlack }}" style="flex: 1; height: 36px; border: {{ isBlack ? '2px solid #2D7CF0' : '1px solid rgba(0,0,0,0.15)' }}; background: #000; border-radius: 3px; cursor: pointer;"></button>
          <button onClick="{{ setWhite }}" style="flex: 1; height: 36px; border: {{ isWhite ? '2px solid #2D7CF0' : '1px solid rgba(0,0,0,0.15)' }}; background: #fff; border-radius: 3px; cursor: pointer;"></button>
        </div>

        <!-- opacité -->
        <div style="display: flex; align-items: center; gap: 8px;">
          <span style="font-size: 10px; color: rgba(0,0,0,0.4); flex-shrink: 0; width: 48px;">Opacité</span>
          <input type="range" min="0" max="100" step="1" value="{{ selOpacity }}" onInput="{{ onOpacityChange }}"

  _ensureH2C = () => {

      s.onload = () => res();

  };

  // ── PNG export ──
  openCleanView  = () => this.setState({ cleanView: true, selectedId: null });
  closeCleanView = () => this.setState({ cleanView: false });

  // render to a PNG and open it in a new browser tab (savable / shareable)
  openInNewTab = () => {
    this._ensureH2C()

          windowWidth: pageLayout.fmtW, windowHeight: pageLayout.fmtH,

          canvas.toBlob((blob) => {

  // build a chrome-free, native-resolution clone of the artboard for screenshotting

    const { pageLayout, format } = this.state;
    if (!pageLayout) return null;

    const K = pageLayout.fmtW / pageLayout.w;      // screen → native upscale
    const nativeW = pageLayout.fmtW;

    // background image (relative to page origin)
    const { bgImages, bgSelected, bgScale, bgRotate, bgPosX, bgPosY } = this.state;
    const allBgPool = [...this.BUILT_IN_BG, ...bgImages];
    const activeBgImg = allBgPool.find(b => b.id === bgSelected);
    const bgNode = activeBgImg ? React.createElement("div", {
      style: { position: "absolute", inset: 0, overflow: "hidden", zIndex: 0 }
    },

        src: activeBgImg.url, crossOrigin: "anonymous",
        style: {
          position: "absolute", left: bgPosX + "%", top: bgPosY + "%",
          width: bgScale + "%", height: "auto",
          transform: "translate(-" + bgPosX + "%, -" + bgPosY + "%) rotate(" + bgRotate + "deg)",
          transformOrigin: "center center", maxWidth: "none",
        }
      })
    ) : null;

    // frames at on-screen scale, relative to page origin, no chrome
    const frameNodes = this.state.frames.map((f, _fi) => {
      const fnt = this.FONTS[f.font] || this.FONTS.none;
      const rx = f.x - pageLayout.x;
      const ry = f.y - pageLayout.y;
      const liveEl = this._editableRefs[f.id];
      const html = (liveEl && liveEl.innerHTML) || f.html || this._escHtml(f.text);
      return React.createElement("div", {
        key: "clean-" + f.id,
        style: { position: "absolute", left: rx + "px", top: ry + "px", width: f.w + "px", zIndex: _fi + 1 },
      },
        React.createElement("div", {
          dangerouslySetInnerHTML: { __html: html },
          style: {
            fontFamily: fnt.fontFamily,
            fontVariationSettings: fnt.fontVariationSettings,
            fontWeight: fnt.fontWeight || 400,
            fontSize: (f.fontSize || 16) + "px",
            color: f.color || "#000000",
            opacity: (f.opacity !== undefined ? f.opacity : 100) / 100,
            transform: fnt.transform,
            transformOrigin: fnt.transformOrigin,
            whiteSpace: "pre-wrap", wordBreak: "break-word", lineHeight: 1.05,
          }
        })
      );
    });

    // the artboard, at on-screen size, upscaled by K to native px
    // animated layers — so the clean view shows the real final result
    const cleanShader = this.state.shaderBg ? React.createElement("iframe", {
      key: "clean-shader", ref: (el) => { this._cleanShaderFrame = el; },
      src: this._shaderUrl(this.state.shaderBg), scrolling: "no",
      style: { position: "absolute", inset: 0, width: "100%", height: "100%", border: "none", pointerEvents: "none", zIndex: 0, background: "transparent" }
    }) : null;
    const cleanAura = this.state.auraOn ? React.createElement("iframe", {
      key: "clean-aura", ref: (el) => { this._cleanAuraFrame = el; },
      src: "uploads/aura-anim.html", scrolling: "no",
      style: { position: "absolute", inset: 0, width: "100%", height: "100%", border: "none", pointerEvents: "none", zIndex: 0, background: "transparent" }
    }) : null;

    const artboard = React.createElement("div", {
      ref: (el) => { this._cleanArtboard = el; },
      style: {
        position: "absolute", top: 0, left: 0,
        width: pageLayout.w + "px", height: pageLayout.h + "px",
        background: this.state.bgColor || "#ffffff", overflow: "hidden",
        transform: "scale(" + K + ")", transformOrigin: "top left",
      }

    },

        onClick: this.closeCleanView,

        }
      },
        React.createElement("svg", { width: 11, height: 11, viewBox: "0 0 11 11", fill: "none", stroke: "currentColor", strokeWidth: 1.6, strokeLinecap: "round", strokeLinejoin: "round" },
          React.createElement("path", { d: "M6.5 2L3 5.5l3.5 3.5" })),
        "Retour"
      ),
      React.createElement("span", { style: { fontWeight: 600 } },
        (fmt ? fmt.label + " · " : "") + nativeW + "×" + nativeH + " px"),
      React.createElement("span", { style: { color: "rgba(255,255,255,0.7)" } },
        "Capture cet écran — ⌘⇧4 (Mac) · ⊞+Maj+S (Windows). Écran Retina = 2× résolution."),
      React.createElement("div", { style: { flex: 1 } }),
      React.createElement("button", {
        onClick: this.openInNewTab,
        title: "Ouvrir le rendu dans un nouvel onglet (clic droit → Enregistrer)",
        style: {
          display: "inline-flex", alignItems: "center", gap: "5px",
          padding: "0 12px", height: "28px", border: "1px solid rgba(255,255,255,0.3)",
          background: "transparent", color: "#fff", fontSize: "11px",
          fontFamily: "inherit", cursor: "pointer", borderRadius: "3px", whiteSpace: "nowrap",
        }
      },
        React.createElement("svg", { width: 11, height: 11, viewBox: "0 0 12 12", fill: "none", stroke: "currentColor", strokeWidth: 1.4, strokeLinecap: "round", strokeLinejoin: "round" },
          React.createElement("path", { d: "M4.5 2H2.5A0.5 0.5 0 002 2.5v7a0.5 0.5 0 00.5.5h7a0.5 0.5 0 00.5-.5v-2M7 2h3v3M10 2L5.5 6.5" })),
        "Nouvel onglet"
      ),
      React.createElement("button", {
        onClick: this.exportPng,
        title: "Télécharger un PNG (la largeur de police peut différer légèrement)",
        style: {
          padding: "0 12px", height: "28px", border: "1px solid rgba(255,255,255,0.3)",

        }
      }, "Télécharger PNG"),

        onClick: this.exportVideo,
        title: "Enregistrer une vidéo de 10 s (fond animé + texte)",
        style: {
          padding: "0 12px", height: "28px", border: "1px solid rgba(255,255,255,0.3)",
          background: this.state.recording ? "rgba(232,168,124,0.25)" : "transparent",
          color: "#fff", fontSize: "11px",
          fontFamily: "inherit", cursor: this.state.recording ? "default" : "pointer", borderRadius: "3px", whiteSpace: "nowrap",
        }
      }, this.state.recording ? ("Enregistrement… " + this.state.recordPct + "%") : "Vidéo 10 s"),
      React.createElement("button", {
        onClick: this.closeCleanView,
        style: {

  exportPng = () => {
    this._ensureH2C()
      .then(() => (document.fonts && document.fonts.ready) ? document.fonts.ready : null)
      .then(() => this._doExportPng())
      .catch((err) => {
        console.error(err);
        alert("Impossible de charger l'outil d'export (réseau ?). Réessaie.");
      });
  };

  _doExportPng = () => {
    const { pageLayout, format } = this.state;
    if (!pageLayout) { alert("Choisis un format d'abord."); return; }

    // If the clean view is open, capture its native-size artboard directly (no chrome present).
    if (this.state.cleanView && this._cleanArtboard) {
      window.html2canvas(this._cleanArtboard, {
        scale: 1,
        useCORS: true, allowTaint: true,
        backgroundColor: "#ffffff", logging: false,
        width: pageLayout.fmtW, height: pageLayout.fmtH,
        windowWidth: pageLayout.fmtW, windowHeight: pageLayout.fmtH,
      }).then((canvas) => this._download(canvas, format))
        .catch((err) => { console.error("Export PNG failed:", err); alert("Export PNG impossible. Utilise une capture d'écran."); });
      return;
    }

    if (!this._canvasEl) { return; }
    const target  = this._canvasEl;
    const exportW = pageLayout.fmtW;          // full-res target width (e.g. 1080)
    const scale   = exportW / pageLayout.w;   // upscale from on-screen size to native px

    // hide UI chrome that shouldn't export (safe zones, handles, move handle, frame drag bar, A-pont drag handles)
    const allHide = [...document.querySelectorAll(
      ".v2-safe-zone-overlay, .v2-frame-drag, .v2-frame-handle-l, .v2-frame-handle-r, .v2-frame-handle-t, .v2-frame-handle-b, .v2-move-handle, .v2-bridge-ext-handle, .v2-page-label"
    )];
    allHide.forEach(el => { el._prevDisplay = el.style.display; el.style.display = "none"; });
    // drop selection outline on frames during capture
    const selEl = this._canvasEl.querySelector('[data-selected="true"]');
    if (selEl) { selEl._prevSel = selEl.getAttribute("data-selected"); selEl.setAttribute("data-selected", "false"); }

    window.html2canvas(target, {
      scale,
      x: pageLayout.x,
      y: pageLayout.y,
      width:  pageLayout.w,
      height: pageLayout.h,
      useCORS: true,
      allowTaint: true,
      backgroundColor: "#ffffff",
      logging: false,
    }).then((canvas) => {
      allHide.forEach(el => { el.style.display = el._prevDisplay || ""; });
      if (selEl && selEl._prevSel) selEl.setAttribute("data-selected", selEl._prevSel);
      const link = document.createElement("a");
      const fmt  = this.FORMATS.find(f => f.id === format);
      const name = (fmt && fmt.label ? fmt.label.replace(/[^a-z0-9]/gi, "-").toLowerCase() : "export") + "-" + Date.now() + ".png";
      link.download = name;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }).catch((err) => {
      allHide.forEach(el => { el.style.display = el._prevDisplay || ""; });
      if (selEl && selEl._prevSel) selEl.setAttribute("data-selected", selEl._prevSel);
      console.error("Export PNG failed:", err);
      alert("Export impossible. Vérifie que les fonds chargés sont du même domaine.");
    });
  };

  _download = (canvas, format) => {
    const link = document.createElement("a");
    const fmt  = this.FORMATS.find(f => f.id === format);
    const name = (fmt && fmt.label ? fmt.label.replace(/[^a-z0-9]/gi, "-").toLowerCase() : "export") + "-" + Date.now() + ".png";
    link.download = name;
    link.href = canvas.toDataURL("image/png");
    link.click();
  };

  // ── 10s video export ──
  // Routes to WebCodecs (real MP4/H.264, social-ready) when available,
  // else falls back to MediaRecorder (WebM/MP4 depending on browser).
  _pickVideoMime() {
    const cands = ["video/mp4;codecs=h264", "video/webm;codecs=vp9", "video/webm;codecs=vp8", "video/webm"];
    for (const m of cands) { try { if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m; } catch (e) {} }
    return "video/webm";
  }

  exportVideo = () => {
    if (this.state.recording) return;
    const { pageLayout, format, bgColor } = this.state;
    if (!pageLayout) { alert("Choisis un format d'abord."); return; }
    if (!window.MediaRecorder && !window.VideoEncoder) { alert("Ton navigateur ne supporte pas l'enregistrement vidéo."); return; }

    this.setState({ recording: true, recordPct: 0 });
    this._ensureH2C()
      .then(() => (document.fonts && document.fonts.ready) ? document.fonts.ready : null)
      .then(() => this._doExportVideo(pageLayout, format, bgColor))
      .catch((err) => { console.error(err); alert("Export vidéo impossible : " + (err && err.message)); this.setState({ recording: false }); });
  };

  _videoFileName(format, ext) {
    const fmt = this.FORMATS.find((f) => f.id === format);
    return (fmt && fmt.label ? fmt.label.replace(/[^a-z0-9]/gi, "-").toLowerCase() : "video") + "-" + Date.now() + "." + ext;
  }
  _downloadBlob(blob, name) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  _doExportVideo = (pageLayout, format, bgColor) => {
    const outW = pageLayout.fmtW, outH = pageLayout.fmtH;
    const captureScale = outW / pageLayout.w;

    // transparent TEXT snapshot (hide chrome + animated iframes + page bg)
    const hide = [...document.querySelectorAll(
      ".v2-safe-zone-overlay, .v2-page-label, .v2-frame-drag, .v2-move-handle, .v2-bridge-ext-handle, .v2-frame-handle, .v2-frame-handle-l, .v2-frame-handle-r, .v2-frame-handle-t, .v2-frame-handle-b"
    )];
    const iframes = [this._auraFrame, this._shaderFrame, this._artboardEl].filter(Boolean);
    const toHide = [...hide, ...iframes];
    toHide.forEach((el) => { el._pv = el.style.visibility; el.style.visibility = "hidden"; });
    const selEl = this._canvasEl && this._canvasEl.querySelector('[data-selected="true"]');
    if (selEl) { selEl._ps = selEl.getAttribute("data-selected"); selEl.setAttribute("data-selected", "false"); }

    return window.html2canvas(this._canvasEl, {
      scale: captureScale, x: pageLayout.x, y: pageLayout.y, width: pageLayout.w, height: pageLayout.h,
      backgroundColor: null, useCORS: true, allowTaint: true, logging: false,
    }).then((textCanvas) => {
      toHide.forEach((el) => { el.style.visibility = el._pv || ""; });
      if (selEl && selEl._ps) selEl.setAttribute("data-selected", selEl._ps);

      const auraCanvas   = (this._cleanAuraFrame   || this._auraFrame)   && ((this._cleanAuraFrame   || this._auraFrame).contentDocument)   && (this._cleanAuraFrame   || this._auraFrame).contentDocument.querySelector("#c");
      const shaderCanvas = (this._cleanShaderFrame || this._shaderFrame) && ((this._cleanShaderFrame || this._shaderFrame).contentDocument) && (this._cleanShaderFrame || this._shaderFrame).contentDocument.querySelector("#root canvas");

      const comp = document.createElement("canvas");
      comp.width = outW; comp.height = outH;
      const ctx = comp.getContext("2d");
      const draw = () => {
        ctx.clearRect(0, 0, outW, outH);
        if (bgColor) { ctx.fillStyle = bgColor; ctx.fillRect(0, 0, outW, outH); }
        try { if (shaderCanvas) ctx.drawImage(shaderCanvas, 0, 0, outW, outH); } catch (e) {}
        try { if (auraCanvas)   ctx.drawImage(auraCanvas,   0, 0, outW, outH); } catch (e) {}
        ctx.drawImage(textCanvas, 0, 0, outW, outH);
      };

      if (window.VideoEncoder && window.VideoFrame) {
        return this._encodeWebCodecs(comp, draw, outW, outH, format)
          .catch((err) => { console.warn("WebCodecs failed, falling back:", err); return this._encodeMediaRecorder(comp, draw, format); });
      }
      return this._encodeMediaRecorder(comp, draw, format);
    });
  };

  // ── B: WebCodecs → real MP4/H.264 ──
  _encodeWebCodecs = async (comp, draw, outW, outH, format) => {
    let mp4;
    try { mp4 = await import("https://esm.sh/mp4-muxer@5.2.1"); }
    catch (e) { return this._encodeMediaRecorder(comp, draw, format); }
    const { Muxer, ArrayBufferTarget } = mp4;

    const fps = 30, DUR = 10000, total = Math.round(fps * DUR / 1000);
    const target = new ArrayBufferTarget();
    const muxer = new Muxer({ target, fastStart: "in-memory", video: { codec: "avc", width: outW, height: outH } });
    const encoder = new VideoEncoder({ output: (c, m) => muxer.addVideoChunk(c, m), error: (e) => console.error("VideoEncoder:", e) });

    const candidates = ["avc1.640034", "avc1.4d0034", "avc1.640028", "avc1.4d0028", "avc1.42E01E"];
    let ok = false;
    for (const codec of candidates) {
      try {
        const sup = await VideoEncoder.isConfigSupported({ codec, width: outW, height: outH, bitrate: 12000000, framerate: fps });
        if (sup && sup.supported) { encoder.configure({ codec, width: outW, height: outH, bitrate: 12000000, framerate: fps }); ok = true; break; }
      } catch (e) {}
    }
    if (!ok) { return this._encodeMediaRecorder(comp, draw, format); }

    let i = 0;
    const t0 = performance.now();
    await new Promise((resolve) => {
      const tick = () => {
        const elapsed = performance.now() - t0;
        const want = Math.min(total, Math.floor(elapsed / 1000 * fps) + 1);
        while (i < want) {
          draw();
          const vf = new VideoFrame(comp, { timestamp: Math.round(i * 1e6 / fps), duration: Math.round(1e6 / fps) });
          encoder.encode(vf); vf.close();
          i++;
          const pct = Math.min(100, Math.round(i / total * 100));
          if (pct !== this.state.recordPct) this.setState({ recordPct: pct });
        }
        if (i < total) { this._recRAF = requestAnimationFrame(tick); } else resolve();
      };
      this._recRAF = requestAnimationFrame(tick);
    });
    await encoder.flush();
    muxer.finalize();
    this._downloadBlob(new Blob([target.buffer], { type: "video/mp4" }), this._videoFileName(format, "mp4"));
    this.setState({ recording: false, recordPct: 0 });
  };

  // ── A/fallback: MediaRecorder (WebM, or MP4 on Safari) ──
  _encodeMediaRecorder = (comp, draw, format) => {
    return new Promise((resolve) => {
      const stream = comp.captureStream(30);
      const mime = this._pickVideoMime();
      const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 12000000 });
      const chunks = [];
      rec.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
      rec.onstop = () => {
        const ext = mime.indexOf("mp4") >= 0 ? "mp4" : "webm";
        this._downloadBlob(new Blob(chunks, { type: mime }), this._videoFileName(format, ext));
        this.setState({ recording: false, recordPct: 0 });
        resolve();
      };
      const DUR = 10000, t0 = performance.now();
      const drawFrame = () => {
        const elapsed = performance.now() - t0;
        draw();
        const pct = Math.min(100, Math.round((elapsed / DUR) * 100));
        if (pct !== this.state.recordPct) this.setState({ recordPct: pct });
        if (elapsed < DUR) { this._recRAF = requestAnimationFrame(drawFrame); } else { rec.stop(); }
      };
      rec.start();
      this._recRAF = requestAnimationFrame(drawFrame);
    });
  };

  // ── formats ──
  FORMATS = [
    { id: "ig-post",     w: 1080, h: 1350,  label: "IG Post · 4:5"  },
    { id: "ig-square",   w: 1080, h: 1080,  label: "IG Carré · 1:1" },
    { id: "ig-story",    w: 1080, h: 1920,  label: "Story · 9:16"   },
    { id: "li-post",     w: 1200, h: 628,   label: "LinkedIn · 1.9:1" },
    { id: "li-portrait", w: 1080, h: 1350,  label: "LI Portrait"    },
    { id: "affiche-a4",  w: 2480, h: 3508,  label: "Affiche A4"     },
    { id: "affiche-a3",  w: 3508, h: 4961,  label: "Affiche A3"     },
    { id: "affiche-land",w: 4961, h: 3508,  label: "A3 Paysage"     },
    { id: "carre-40",    w: 4000, h: 4000,  label: "Carré 40×40"    },
  ];

  _editableRefs = {};
  _artboardEl   = null;

  computePageLayout() {
    const fmt = this.FORMATS.find(f => f.id === this.state.format);
    if (!fmt || !fmt.w) { this.setState({ pageLayout: null, safeZones: [] }); return; }
    const el = this._canvasEl;
    if (!el) return;
    const pad = 48;
    const wsW = el.clientWidth  - pad * 2;
    const wsH = el.clientHeight - pad * 2;
    const scale = Math.min(wsW / fmt.w, wsH / fmt.h, 1);
    const w = fmt.w * scale;
    const h = fmt.h * scale;
    const x = (el.clientWidth  - w) / 2;
    const y = (el.clientHeight - h) / 2;
    const safeZones = (this.SAFE_ZONES[this.state.format] || []).map(z => ({
      ...z,
      left:   z.l * scale, top:    z.t * scale,
      right:  z.r * scale, bottom: z.b * scale,
    }));
    this.setState({ pageLayout: { x, y, w, h, scale, fmtW: fmt.w, fmtH: fmt.h }, safeZones });

    // On first layout, drop the welcome paragraph inside the top-left safe zone of the page
    if (!this._didInitialPlace) {
      this._didInitialPlace = true;
      const inner = (this.SAFE_ZONES[this.state.format] || []).reduce((acc, z) => ({
        l: Math.max(acc.l, z.l), t: Math.max(acc.t, z.t),
      }), { l: 0, t: 0 });
      const fx = x + inner.l * scale;
      const fy = y + inner.t * scale;
      this.setState(s => ({
        frames: s.frames.map(f => {
          if (f.id === "f1") return { ...f, x: Math.round(fx), y: Math.round(fy) };
          if (f.id === "f2") return { ...f, x: Math.round(fx), y: Math.round(fy + 140) };
          return f;
        }),
      }));
    }
  }

  componentDidMount() {
    this._ro = new ResizeObserver(() => this.computePageLayout());
    if (this._canvasEl) this._ro.observe(this._canvasEl);
    // global listener: drag on inline bridge handles (extension + size)
    this._bridgeDragHandler = (e) => {
      // select the clicked bridge → opens the animation panel
      const anyBridge = e.target.closest(".v2-inline-bridge");
      if (anyBridge && anyBridge.dataset.bridgeId) {
        this.selectBridge(anyBridge);
      }

      // ── right handle → horizontal → pe (bridge extension) ──
      const extHandle = e.target.closest(".v2-bridge-ext-handle");
      if (extHandle) {
        e.preventDefault();
        const bridge  = extHandle.closest(".v2-inline-bridge");
        if (!bridge) return;
        const startPe = parseFloat(bridge.dataset.pe)   || 0.3;
        const startX  = e.clientX;
        const size    = parseFloat(bridge.dataset.size) || 20;
        const pxPerPe = (468.15 / 36.96) * size;
        const onMove  = (ev) => {
          const newPe = Math.max(0.02, Math.min(10, startPe + (ev.clientX - startX) / pxPerPe));
          bridge.dataset.pe = newPe;
          this.setBridgePeVisual(bridge, newPe);
        };
        const onUp = () => {
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup",   onUp);
          const ed = bridge.closest(".v2-editable"), fd = bridge.closest("[data-frame-id]");
          if (ed && fd) this.updateFrame(fd.getAttribute("data-frame-id"), { html: ed.innerHTML });
        };
        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup",   onUp);
        return;
      }

    };
    window.addEventListener("pointerdown", this._bridgeDragHandler);

    // animation loop for A-pont bridges
    this._animRAF = requestAnimationFrame(this._tickBridgeAnims);

    // load saved templates (PresetStore)
    this._loadTemplates();

    this._escHandler = (e) => { if (e.key === "Escape" && this.state.cleanView) this.closeCleanView(); };
    window.addEventListener("keydown", this._escHandler);

    // Space cycles the aura stage: full → movement frozen → all frozen → full
    this._spaceHandler = (e) => {
      if (e.code !== "Space" && e.key !== " ") return;
      if (!this.state.auraOn) return;
      const a = document.activeElement;
      if (a && (a.isContentEditable || a.tagName === "INPUT" || a.tagName === "TEXTAREA" || a.tagName === "SELECT")) return;
      e.preventDefault();
      const next = (this.state.auraStage + 1) % 3;
      this.setState({ auraStage: next });
      if (this._auraFrame && this._auraFrame.contentWindow) {
        this._auraFrame.contentWindow.postMessage({ type: "stage", value: next }, "*");
      }
    };
    window.addEventListener("keydown", this._spaceHandler);

    // seed the welcome paragraph with an A-pont in place of the "a" of "déplacer"
    requestAnimationFrame(() => {
      const el = this._editableRefs["f1"];
      const f1 = this.state.frames.find(f => f.id === "f1");
      if (el && f1 && !f1.html) {
        const size = Math.round((f1.fontSize || 28) * 0.72);
        const bridge = this.buildBridgeSpanHTML(0.3, size);
        const html = "éditer. élargir. dépl" + bridge + "cer";
        el.innerHTML = html;
        this.updateFrame("f1", { html });
      }
    });
  }

  componentWillUnmount() {
    this._ro?.disconnect();
    if (this._bridgeDragHandler) window.removeEventListener("pointerdown", this._bridgeDragHandler);
    if (this._animRAF) cancelAnimationFrame(this._animRAF);
    if (this._escHandler) window.removeEventListener("keydown", this._escHandler);
    if (this._spaceHandler) window.removeEventListener("keydown", this._spaceHandler);
  }

  // ── A-pont animation ──
  _nextBridgeId = () => "br" + (this._bridgeSeq = (this._bridgeSeq || 0) + 1);

  selectBridge = (bridgeEl) => {
    const id = bridgeEl.dataset.bridgeId;
    if (!id) return;
    this.setState((s) => {
      if (s.bridgeAnims[id]) return { selectedBridgeId: id };
      const pe0 = parseFloat(bridgeEl.dataset.pe) || 0.3;
      return {
        selectedBridgeId: id,
        bridgeAnims: { ...s.bridgeAnims, [id]: { animate: false, pe0, pe1: Math.min(1.5, pe0 + 0.6), dur: 5 } },
      };
    });
  };

  closeBridgePanel = () => this.setState({ selectedBridgeId: null });

  setBridgeAnim = (patch) => {
    const id = this.state.selectedBridgeId;
    if (!id) return;
    this.setState((s) => {
      const next = { ...(s.bridgeAnims[id] || {}), ...patch };
      return { bridgeAnims: { ...s.bridgeAnims, [id]: next } };
    }, () => {
      // when turning animation off, rest the A at its initial position
      const cfg = this.state.bridgeAnims[id];
      if (cfg && !cfg.animate) {
        const el = this._findBridgeEl(id);
        if (el) this.setBridgePeVisual(el, cfg.pe0);
      }
    });
  };

  _findBridgeEl(id) {
    const refs = Object.values(this._editableRefs || {});
    for (const el of refs) {
      if (!el) continue;
      const b = el.querySelector('.v2-inline-bridge[data-bridge-id="' + id + '"]');
      if (b) return b;
    }
    return null;
  }

  setBridgePeVisual(el, pe) {
    const size = parseFloat(el.dataset.size) || 90;
    const svg = el.querySelector("svg");
    if (!svg) return;
    const path = svg.querySelector("path");
    // cap so the bar never exceeds the available width on its line (no wrap, no overflow)
    const maxW = this._bridgeMaxW(el);
    const wantW = this.aBridgePxW(pe, size);
    const usePe = wantW > maxW ? this._peForWidth(maxW, size) : pe;
    svg.setAttribute("viewBox", this.aViewBox(usePe));
    svg.setAttribute("width", String(this.aBridgePxW(usePe, size)));
    svg.setAttribute("height", String(size));
    if (path) path.setAttribute("d", this.buildAPath(usePe));
  }

  _tickBridgeAnims = () => {
    try {
      const anims = this.state.bridgeAnims || {};
      const ids = Object.keys(anims).filter((id) => anims[id] && anims[id].animate);
      if (ids.length) {
        const now = performance.now() / 1000;
        const map = {};
        Object.values(this._editableRefs || {}).forEach((el) => {
          if (!el) return;
          el.querySelectorAll(".v2-inline-bridge").forEach((b) => {
            if (b.dataset.bridgeId) map[b.dataset.bridgeId] = b;
          });
        });
        ids.forEach((id) => {
          const cfg = anims[id], el = map[id];
          if (!el) return;
          const dur = Math.max(4, cfg.dur || 5);
          const phase = (now % (2 * dur)) / dur;     // 0..2
          const f = phase < 1 ? phase : (2 - phase); // linear triangle 0→1→0
          const pe = cfg.pe0 + (cfg.pe1 - cfg.pe0) * f;
          this.setBridgePeVisual(el, pe);
        });
      }
    } catch (err) { /* keep the loop alive */ }
    this._animRAF = requestAnimationFrame(this._tickBridgeAnims);
  };

  renderBridgeAnimPanel() {
    const id = this.state.selectedBridgeId;
    if (!id) return null;
    const cfg = this.state.bridgeAnims[id] || { animate: false, pe0: 0.3, pe1: 0.9, dur: 1.6 };

    // hard limit: the largest pe that still fits on the line (the blockage)
    const el = this._findBridgeEl(id);
    let maxPe = 1.5;
    if (el) {
      const size = parseFloat(el.dataset.size) || 90;
      maxPe = Math.max(0.1, Math.min(6, this._peForWidth(this._bridgeMaxW(el), size)));
    }
    const maxPeR = Math.round(maxPe * 100) / 100;

    const slider = (label, value, min, max, step, onChange, fmt) =>
      React.createElement("div", { style: { display: "grid", gap: "5px" } },
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "baseline" } },
          React.createElement("span", { style: { fontSize: "11px", color: "rgba(0,0,0,0.6)" } }, label),
          React.createElement("span", { style: { fontSize: "11px", color: "rgba(0,0,0,0.45)", fontWeight: 500, fontVariantNumeric: "tabular-nums" } }, fmt(value))
        ),
        React.createElement("input", {
          type: "range", min, max, step, value,
          onChange: (e) => onChange(parseFloat(e.target.value)),
          style: { width: "100%", height: "4px", accentColor: "#1a1a1a", cursor: "pointer" },
        })
      );

    return React.createElement("div", {
      key: "bridge-panel",
      style: {
        position: "absolute", top: "16px", left: "16px", zIndex: 50,
        width: "260px", background: "#fff", borderRadius: "7px",
        boxShadow: "0 8px 30px rgba(0,0,0,0.2)", border: "1px solid rgba(0,0,0,0.08)",
        padding: "14px 16px", display: "grid", gap: "13px",
        fontFamily: "-apple-system, sans-serif",
      }
    },
      // header
      React.createElement("div", { style: { display: "flex", alignItems: "center", gap: "8px" } },
        React.createElement("span", { style: { fontSize: "12px", fontWeight: 600, color: "#1a1a1a", flex: 1 } }, "Animer le A pont"),
        React.createElement("button", {
          onClick: this.closeBridgePanel, title: "Fermer",
          style: { width: "22px", height: "22px", border: "1px solid rgba(0,0,0,0.12)", background: "#fff", color: "rgba(0,0,0,0.45)", fontSize: "13px", cursor: "pointer", borderRadius: "3px", padding: 0, lineHeight: 1 }
        }, "×")
      ),
      // animer toggle
      React.createElement("button", {
        onClick: () => this.setBridgeAnim({ animate: !cfg.animate }),
        style: {
          display: "flex", alignItems: "center", gap: "9px", width: "100%",
          padding: "8px 10px", borderRadius: "5px", cursor: "pointer", fontFamily: "inherit",
          border: cfg.animate ? "1.5px solid #2D7CF0" : "1px solid rgba(0,0,0,0.14)",
          background: cfg.animate ? "rgba(45,124,240,0.06)" : "#fff",
        }
      },
        React.createElement("span", { style: { flex: 1, textAlign: "left", fontSize: "11px", fontWeight: 600, color: "#1a1a1a" } }, "Animer ?"),
        React.createElement("span", {
          style: { width: "30px", height: "17px", borderRadius: "9px", flexShrink: 0, position: "relative", background: cfg.animate ? "#2D7CF0" : "rgba(0,0,0,0.18)", transition: "background 0.15s" }
        },
          React.createElement("span", { style: { position: "absolute", top: "2px", left: cfg.animate ? "15px" : "2px", width: "13px", height: "13px", borderRadius: "50%", background: "#fff", transition: "left 0.15s" } })
        )
      ),
      // controls
      slider("Position initiale", Math.min(cfg.pe0, maxPeR), 0.05, maxPeR, 0.01, (v) => this.setBridgeAnim({ pe0: Math.min(v, maxPeR) }), (v) => v.toFixed(2)),
      slider("Position maximale", Math.min(cfg.pe1, maxPeR), 0.05, maxPeR, 0.01, (v) => this.setBridgeAnim({ pe1: Math.min(v, maxPeR) }), (v) => v.toFixed(2)),
      slider("Temps", cfg.dur, 4, 12, 0.1, (v) => this.setBridgeAnim({ dur: v }), (v) => v.toFixed(1) + "s"),
      React.createElement("div", { style: { fontSize: "9px", color: "rgba(0,0,0,0.4)", fontStyle: "italic", lineHeight: 1.5 } },
        "Va-et-vient linéaire (pas d'ease). Blocage à la largeur dispo (" + maxPeR.toFixed(2) + ").")
    );
  }


  insertABridgeIntoFrame = (frameId) => {
    const el = this._editableRefs[frameId];
    if (!el) return;
    el.focus();
    const pe = 0.3; // sensible default; user adjusts by dragging after insert

    // Measure real cap-height using canvas.measureText — this API returns
    // actualBoundingBoxAscent = distance from baseline to top of "H" = cap-height.
    // This is pre-transform (not affected by scaleY on the parent), which is exactly
    // what we need for the SVG height attribute.
    const cs = window.getComputedStyle(el);
    const computedFs = parseFloat(cs.fontSize) || 16;
    let size = Math.round(computedFs * 0.72); // safe fallback
    try {
      const cv = document.createElement("canvas");
      const ctx = cv.getContext("2d");
      ctx.font = computedFs + "px " + cs.fontFamily;
      const m = ctx.measureText("H");
      if (m.actualBoundingBoxAscent > 2) size = Math.round(m.actualBoundingBoxAscent);
    } catch (e) {}
    const vb   = this.aViewBox(pe);
    const path = this.buildAPath(pe);
    const w    = this.aBridgePxW(pe, size);

    const span = document.createElement("span");
    span.className = "v2-inline-bridge";
    span.setAttribute("contenteditable", "false");
    span.dataset.pe   = pe;
    span.dataset.size = size;
    span.dataset.bridgeId = this._nextBridgeId();

    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("width",  String(w));
    svg.setAttribute("height", String(size));
    svg.setAttribute("viewBox", vb);
    svg.setAttribute("preserveAspectRatio", "none");
    svg.style.cssText = "display:block;color:inherit;overflow:visible;";
    const pathEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
    pathEl.setAttribute("d", path);
    pathEl.setAttribute("fill", "currentColor");
    pathEl.setAttribute("fill-rule", "evenodd");
    svg.appendChild(pathEl);
    span.appendChild(svg);

    const dragHandle = document.createElement("span");
    dragHandle.className = "v2-bridge-ext-handle";
    span.appendChild(dragHandle);

    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0 && el.contains(sel.anchorNode)) {
      const range = sel.getRangeAt(0);
      range.deleteContents();
      range.insertNode(span);
      range.setStartAfter(span);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    } else {
      el.appendChild(span);
    }
    this.updateFrame(frameId, { html: el.innerHTML });
  };

  // ── A-pont helpers (ported from main.js buildPath) ──
  buildAPath(pc) {
    const r  = pc * 468.15;
    const ri = pc * 467.70;
    const xo = 234.065 * (1 - pc);
    const f  = (v) => (xo + v).toFixed(3);
    const g  = (v) => (xo + v + r).toFixed(3);
    const gi = (v) => (xo + v + ri).toFixed(3);
    return (
      `M${f(9.79)},0 L${f(6.02)},15.99 L${f(2.29)},29.91 ` +
      `L${f(0.21)},36.96 L${f(20.55)},36.96 L${f(21.24)},30.52 ` +
      `L${g(45.46)},30.52 L${g(46.03)},36.96 L${g(68.40)},36.96 ` +
      `L${g(64.42)},23.50 L${g(58.35)},0 Z ` +
      `M${g(44.15)},21.70 L${gi(41.36)},8.82 ` +
      `L${f(25.30)},8.82 L${f(22.52)},21.70 Z`
    );
  }
  aViewBox(pc) {
    const r = pc * 468.15;
    const xo = 234.065 * (1 - pc);
    const xMin = xo + 0.21;
    const xMax = xo + 68.40 + r;
    return `${xMin.toFixed(3)} 0 ${(xMax - xMin).toFixed(3)} 36.96`;
  }
  // px width for a given pe + height (px)
  aBridgePxW(pe, h) { return ((68.19 + pe * 468.15) / 36.96) * h; }

  // max bar width (px) that fits from the bridge's left edge to the frame's right padding
  _bridgeMaxW(bridgeEl) {
    const ed = bridgeEl.closest(".v2-editable");
    if (!ed) return Infinity;
    const br = bridgeEl.getBoundingClientRect();
    const er = ed.getBoundingClientRect();
    const padR = parseFloat(getComputedStyle(ed).paddingRight) || 0;
    return Math.max(20, (er.right - padR) - br.left);
  }
  // largest pe whose rendered width fits within maxW
  _peForWidth(maxW, size) {
    // aBridgePxW = ((68.19 + pe*468.15)/36.96)*size  →  solve for pe
    const pe = ((maxW / size) * 36.96 - 68.19) / 468.15;
    return Math.max(0.02, pe);
  }

  // build the inline-bridge span as an HTML string (for pre-seeding frame content)
  buildBridgeSpanHTML(pe, size) {
    const vb = this.aViewBox(pe);
    const path = this.buildAPath(pe);
    const w = this.aBridgePxW(pe, size);
    return '<span class="v2-inline-bridge" contenteditable="false" data-bridge-id="' + this._nextBridgeId() + '" data-pe="' + pe + '" data-size="' + size + '">' +
      '<svg width="' + w + '" height="' + size + '" viewBox="' + vb + '" preserveAspectRatio="none" style="display:block;color:inherit;overflow:visible;">' +
      '<path d="' + path + '" fill="currentColor" fill-rule="evenodd"></path></svg>' +
      '<span class="v2-bridge-ext-handle"></span></span>';
  }

  // font presets — only variation-settings + transform, no size, no color
  FONTS = {
    main1: {
      fontFamily: '"obviously-variable", sans-serif',
      fontVariationSettings: '"ital" 0, "wght" 803, "wdth" 121',
      fontWeight: 800,
      transform: "scaleY(0.88)",
      transformOrigin: "bottom left",
    },
    main2: {
      fontFamily: '"obviously-variable", sans-serif',
      fontVariationSettings: '"ital" 0, "wght" 699, "wdth" 121',
      fontWeight: 700,
      transform: "scaleY(0.88)",
      transformOrigin: "bottom left",
    },
    corps1: {
      fontFamily: '"Helvetica Neue", Helvetica, Arial, sans-serif',
      fontVariationSettings: "normal",
      fontWeight: 300,
      transform: "none",
      transformOrigin: "initial",
    },
    corps2: {
      fontFamily: 'Arial, "Helvetica Neue", Helvetica, sans-serif',
      fontVariationSettings: "normal",
      fontWeight: 400,
      transform: "none",
      transformOrigin: "initial",
    },
    corps3: {
      fontFamily: 'Arial, "Helvetica Neue", Helvetica, sans-serif',
      fontVariationSettings: "normal",
      fontWeight: 700,
      transform: "none",

      // A pont: only when frame has Main1 or Main2
      selHasMainFont:  sel && (sel.font === "main1" || sel.font === "main2"),
      selNeedsMain:    sel && sel.type !== "a-bridge" && sel.font !== "main1" && sel.font !== "main2",
      activeFont: sel ? (sel.font || "none") : "none",
      selFontSize: sel ? (sel.fontSize || 16) : 16,
      onFontSizeChange: (e) => { if (sel) this.setFrameFontSize(sel.id, parseFloat(e.target.value)); },

      // panel tabs
      activePanel: this.state.activePanel,
      typePanelDisplay: this.state.activePanel === "type"  ? "block" : "none",
      typePanelFg:     this.state.activePanel === "type"  ? "#1a1a1a" : "rgba(0,0,0,0.4)",
      typePanelBorder: this.state.activePanel === "type"  ? "#1a1a1a" : "transparent",
      fondsPanelFg:    this.state.activePanel === "fonds" ? "#1a1a1a" : "rgba(0,0,0,0.4)",
      fondsPanelBorder:this.state.activePanel === "fonds" ? "#1a1a1a" : "transparent",
      showTypePanel:  this.showTypePanel,
      showFondsPanel: this.showFondsPanel,
      showLayersPanel: this.showLayersPanel,
      layersPanelFg:     this.state.activePanel === "layers" ? "#1a1a1a" : "rgba(0,0,0,0.4)",
      layersPanelBorder: this.state.activePanel === "layers" ? "#1a1a1a" : "transparent",
      layersPanel: this.renderLayersPanel(),
      togglePanel: this.togglePanel,
      cyclePanelWidth: this.cyclePanelWidth,
      panelWidth: this.PANEL_WIDTHS[this.state.panelWidthStep] + "px",
      panelWidthLabel: ["S", "M", "L"][this.state.panelWidthStep],
      panelCollapsedClass: this.state.panelCollapsed ? "is-collapsed" : "",
      panelInnerDisplay: this.state.panelCollapsed ? "none" : "flex",
      panelToggleIcon: this.state.panelCollapsed ? "‹" : "›",
      panelToggleTitle: this.state.panelCollapsed ? "Afficher les panneaux" : "Masquer les panneaux",
      fondsPanel: this.renderFondsPanel(),
      bgControls: this.renderBgControls(),

      // color + opacity
      selColor:   sel ? (sel.color   || "#000000") : "#000000",
      selOpacity: sel ? (sel.opacity !== undefined ? sel.opacity : 100) : 100,
      setBlack:   () => { if (sel) this.updateFrame(sel.id, { color: "#000000" }); },
      setWhite:   () => { if (sel) this.updateFrame(sel.id, { color: "#ffffff" }); },
      onOpacityChange: (e) => { if (sel) this.updateFrame(sel.id, { opacity: parseFloat(e.target.value) }); },
      isBlack: !sel || (sel.color || "#000000") === "#000000",
      isWhite:  sel && sel.color === "#ffffff",

      // preset size buttons
      sz11Bg: sel && sel.fontSize===11 ? "#1a1a1a" : "#fff",
      sz14Bg: sel && sel.fontSize===14 ? "#1a1a1a" : "#fff",
      sz18Bg: sel && sel.fontSize===18 ? "#1a1a1a" : "#fff",
      sz28Bg: sel && sel.fontSize===28 ? "#1a1a1a" : "#fff",
      sz36Bg: sel && sel.fontSize===36 ? "#1a1a1a" : "#fff",
      sz48Bg: sel && sel.fontSize===48 ? "#1a1a1a" : "#fff",
      sz72Bg: sel && sel.fontSize===72 ? "#1a1a1a" : "#fff",
      sz96Bg: sel && sel.fontSize===96 ? "#1a1a1a" : "#fff",
      sz128Bg:sel && sel.fontSize===128? "#1a1a1a" : "#fff",
      sz11Border: sel && sel.fontSize===11 ? "1.5px solid #1a1a1a" : "1px solid rgba(0,0,0,0.12)",
      sz14Border: sel && sel.fontSize===14 ? "1.5px solid #1a1a1a" : "1px solid rgba(0,0,0,0.12)",
      sz18Border: sel && sel.fontSize===18 ? "1.5px solid #1a1a1a" : "1px solid rgba(0,0,0,0.12)",
      sz28Border: sel && sel.fontSize===28 ? "1.5px solid #1a1a1a" : "1px solid rgba(0,0,0,0.12)",
      sz36Border: sel && sel.fontSize===36 ? "1.5px solid #1a1a1a" : "1px solid rgba(0,0,0,0.12)",
      sz48Border: sel && sel.fontSize===48 ? "1.5px solid #1a1a1a" : "1px solid rgba(0,0,0,0.12)",
      sz72Border: sel && sel.fontSize===72 ? "1.5px solid #1a1a1a" : "1px solid rgba(0,0,0,0.12)",
      sz96Border: sel && sel.fontSize===96 ? "1.5px solid #1a1a1a" : "1px solid rgba(0,0,0,0.12)",
      sz128Border:sel && sel.fontSize===128? "1.5px solid #1a1a1a" : "1px solid rgba(0,0,0,0.12)",
      setSize11:  () => { if (sel) this.setFrameFontSize(sel.id, 11);  },
      setSize14:  () => { if (sel) this.setFrameFontSize(sel.id, 14);  },
      setSize18:  () => { if (sel) this.setFrameFontSize(sel.id, 18);  },
      setSize28:  () => { if (sel) this.setFrameFontSize(sel.id, 28);  },
      setSize36:  () => { if (sel) this.setFrameFontSize(sel.id, 36);  },
      setSize48:  () => { if (sel) this.setFrameFontSize(sel.id, 48);  },
      setSize72:  () => { if (sel) this.setFrameFontSize(sel.id, 72);  },
      setSize96:  () => { if (sel) this.setFrameFontSize(sel.id, 96);  },
      setSize128: () => { if (sel) this.setFrameFontSize(sel.id, 128); },
      selPe:   (sel && sel.type === "a-bridge") ? sel.pe.toFixed(2) : "",
      selSize: (sel && sel.type === "a-bridge") ? sel.size : "",
      onPeChange:   (e) => { if (sel && sel.type === "a-bridge") this.setPe(sel.id, e.target.value); },
      onSizeChange: (e) => { if (sel && sel.type === "a-bridge") this.setASize(sel.id, e.target.value); },
      // inline insert
      inlinePe: this.state.inlinePe.toFixed(2),
      onInlinePeChange: (e) => this.setState({ inlinePe: parseFloat(e.target.value) }),
      insertInlineA: () => { if (sel && sel.type !== "a-bridge") this.insertABridgeIntoFrame(sel.id); },
    };
  }
}
</script>
</body>
</html>
