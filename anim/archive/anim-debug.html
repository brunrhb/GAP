<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAP — Anim A1/A2 debug</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f0ece4;
      overflow: hidden;
      font-family: monospace;
      font-size: 12px;
    }

    canvas { display: block; position: fixed; inset: 0; }

    #ui {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: rgba(15, 14, 12, 0.78);
      color: #f0ece4;
      padding: 0.75rem 1rem;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      min-width: 230px;
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    .label    { opacity: 0.4; font-size: 10px; margin-top: 0.3rem; letter-spacing: 0.05em; text-transform: uppercase; }
    .label:first-child { margin-top: 0; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .row label { opacity: 0.75; white-space: nowrap; font-size: 11px; }

    input[type=range] { flex: 1; accent-color: #E87040; cursor: pointer; }

    .val { width: 44px; text-align: right; opacity: 0.9; font-size: 11px; }

    #info {
      margin-top: 0.25rem;
      opacity: 0.4;
      font-size: 11px;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 0.4rem;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div class="label">Physique</div>

  <div class="row">
    <label>attraction</label>
    <input type="range" id="sAttr" min="0.5" max="20" step="0.1" value="5">
    <span class="val" id="vAttr">5</span>
  </div>
  <div class="row">
    <label>friction</label>
    <input type="range" id="sFric" min="0.1" max="12" step="0.1" value="1.0">
    <span class="val" id="vFric">1.0</span>
  </div>
  <div class="row">
    <label>répulsion</label>
    <input type="range" id="sRep" min="1000" max="5000000" step="1000" value="1500000">
    <span class="val" id="vRep">1.5M</span>
  </div>
  <div class="row">
    <label>rebond</label>
    <input type="range" id="sRest" min="0" max="1" step="0.05" value="0.55">
    <span class="val" id="vRest">0.55</span>
  </div>

  <div class="label">Orbite / Rôles</div>

  <div class="row">
    <label>orbite base</label>
    <input type="range" id="sCurl" min="0" max="3000" step="10" value="1500">
    <span class="val" id="vCurl">1500</span>
  </div>
  <div class="row">
    <label>seuil orbite</label>
    <input type="range" id="sProx" min="1.5" max="8" step="0.1" value="3.5">
    <span class="val" id="vProx">3.5×</span>
  </div>
  <div class="row">
    <label>délai rôle</label>
    <input type="range" id="sSwitch" min="0.2" max="4" step="0.1" value="1.2">
    <span class="val" id="vSwitch">1.2</span>
  </div>
  <div class="row">
    <label>contour</label>
    <input type="range" id="sContour" min="0" max="1" step="0.05" value="0.65">
    <span class="val" id="vContour">0.65</span>
  </div>

  <div class="label">Rendu debug</div>

  <div class="row">
    <label>rayon core</label>
    <input type="range" id="sCoreR" min="10" max="300" step="1" value="75">
    <span class="val" id="vCoreR">75</span>
  </div>
  <div class="row">
    <label>rayon limite</label>
    <input type="range" id="sLimitR" min="30" max="400" step="1" value="150">
    <span class="val" id="vLimitR">150</span>
  </div>
  <div class="row">
    <label>opacité limite</label>
    <input type="range" id="sLimitO" min="0" max="1" step="0.01" value="0.22">
    <span class="val" id="vLimitO">0.22</span>
  </div>

  <div id="info">dist: — px</div>
</div>

<script>
/* ── GAP — Anim debug A1/A2
   Physique : attraction curseur + répulsion + orbite asymétrique
            + stratégie contour + rebond élastique + inertie de rôle
   Rendu    : core plein (coreR) + limite membrane pointillée (limitR)
   ──────────────────────────────────────────────────────────────── */

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Paramètres ───────────────────────────────────────────
const P = {
  attrK      : 5,
  fricK      : 1.0,
  repK       : 1500000,
  curlK      : 1500,
  restitution: 0.55,
  proxMult   : 3.5,    // seuil = proxMult × limitR
  limitOpacity: 0.22, // opacité du cercle de limite debug
  contourStr : 0.65,   // intensité déflexion vers contour (0 = désactivé, 1 = full)
  coreR      : 75,     // rayon du core plein (px)
  limitR     : 150,    // rayon limite / collision (px)
};

// ── Constantes d'asymétrie ───────────────────────────────
const CURL_BEHIND    = 3.0;   // challenger : forte force tangentielle
const CURL_FRONT     = 0.25;  // dominant   : presque rien
const ATTR_FAR_CLOSE = 0.05;  // challenger proche → répulsion prime largement
const ATTR_FAR_FAR   = 4.0;   // challenger loin  → sprint violent

// ── Inertie de rôle ──────────────────────────────────────
// dominance[i] ∈ [0,1] : 0 = dominant (near), 1 = challenger (far)
const dominance    = [0.0, 1.0];
const SWITCH_SPEED = 1.2;

// ── État ────────────────────────────────────────────────
let W = 0, H = 0;
let cursor = null;
let lastTs = null;

const particles = [
  { x: 0, y: 0, vx: 0, vy: 0 },
  { x: 0, y: 0, vx: 0, vy: 0 },
];

// ── Resize ────────────────────────────────────────────────
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (particles[0].x === 0) {
    particles[0].x = W / 2 - 200;
    particles[0].y = H / 2;
    particles[1].x = W / 2 + 200;
    particles[1].y = H / 2;
  }
}
window.addEventListener('resize', resize);
resize();

// ── Curseur ───────────────────────────────────────────────
window.addEventListener('mousemove', e => { cursor = { x: e.clientX, y: e.clientY }; });
function getCursor() { return cursor ?? { x: W / 2, y: H / 2 }; }

// ── Physique ──────────────────────────────────────────────
function physics(dt) {
  const c = getCursor();
  const [a, b] = particles;

  // vecteur inter-particules
  const dx   = b.x - a.x;
  const dy   = b.y - a.y;
  const dist = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
  const nx   = dx / dist;
  const ny   = dy / dist;

  const repMag  = P.repK  / (dist * dist);
  const curlMag = P.curlK / dist;
  const tx = -ny, ty = nx; // perpendiculaire A→B

  // ── Rôles ─────────────────────────────────────────────
  const dA = Math.sqrt((c.x - a.x) ** 2 + (c.y - a.y) ** 2);
  const dB = Math.sqrt((c.x - b.x) ** 2 + (c.y - b.y) ** 2);
  const farIdx = dA > dB ? 0 : 1;

  const targetDom = [0.0, 0.0];
  targetDom[farIdx] = 1.0;

  const speed = window._switchSpeed ?? SWITCH_SPEED;
  for (let i = 0; i < 2; i++) {
    dominance[i] += (targetDom[i] - dominance[i]) * Math.min(speed * dt, 1);
  }

  // ── Facteurs par particule ────────────────────────────
  const threshold = P.limitR * P.proxMult;
  const proximity = Math.min(dist / threshold, 1); // 0 = proches, 1 = loin

  for (let i = 0; i < 2; i++) {
    const p    = particles[i];
    const sign = i === 0 ? -1 : 1;
    const dom  = dominance[i];

    // attrFactor : dom=0 → 1.0× ; dom=1 → [0.05…4.0] selon prox
    const challAttr = ATTR_FAR_CLOSE + proximity * (ATTR_FAR_FAR - ATTR_FAR_CLOSE);
    const attrFactor = 1.0 + dom * (challAttr - 1.0);

    // curlFactor
    const curlFactor = CURL_FRONT + dom * (CURL_BEHIND - CURL_FRONT);

    // ── 1. Attraction curseur (raw) ──────────────────────
    let fax = (c.x - p.x) * P.attrK * attrFactor;
    let fay = (c.y - p.y) * P.attrK * attrFactor;

    // ── Stratégie contour : déflexion pour les challengeurs proches ──
    // Quand dom > 0 et proximity < 1, on dévie le vecteur d'attraction
    // vers le tangent du périmètre de l'autre particule.
    // La direction du tangent est choisie pour aller vers le curseur.
    const contourWeight = dom * (1 - proximity) * P.contourStr;
    if (contourWeight > 0.001) {
      const other = particles[1 - i];
      // vecteur p → other
      const tox = other.x - p.x;
      const toy = other.y - p.y;
      const tod = Math.max(Math.sqrt(tox * tox + toy * toy), 1);
      // tangente perpendiculaire (deux options)
      const t1x = -toy / tod, t1y =  tox / tod;
      const t2x =  toy / tod, t2y = -tox / tod;
      // choisir celle qui va vers le curseur (dot avec vecteur p→curseur)
      const pcx = c.x - p.x, pcy = c.y - p.y;
      const dot1 = t1x * pcx + t1y * pcy;
      const dot2 = t2x * pcx + t2y * pcy;
      const bestTx = dot1 >= dot2 ? t1x : t2x;
      const bestTy = dot1 >= dot2 ? t1y : t2y;
      // magnitude de l'attraction originale
      const attrMag = Math.sqrt(fax * fax + fay * fay);
      // mélange : (1 - w) × direct + w × tangent
      fax = fax * (1 - contourWeight) + bestTx * attrMag * contourWeight;
      fay = fay * (1 - contourWeight) + bestTy * attrMag * contourWeight;
    }

    // ── 2. Répulsion radiale ──────────────────────────────
    const frx = sign * nx * repMag;
    const fry = sign * ny * repMag;

    // ── 3. Force orbitale ─────────────────────────────────
    const fcx = sign * tx * curlMag * curlFactor;
    const fcy = sign * ty * curlMag * curlFactor;

    // ── 4. Friction ───────────────────────────────────────
    const fdx = -p.vx * P.fricK;
    const fdy = -p.vy * P.fricK;

    p.vx += (fax + frx + fcx + fdx) * dt;
    p.vy += (fay + fry + fcy + fdy) * dt;
    p.x  += p.vx * dt;
    p.y  += p.vy * dt;
  }
}

// ── Collision élastique ───────────────────────────────────
function collide() {
  const [a, b] = particles;
  const dx   = b.x - a.x;
  const dy   = b.y - a.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const minD = P.limitR * 2;

  if (dist < minD && dist > 0.01) {
    const nx = dx / dist;
    const ny = dy / dist;

    const overlap = (minD - dist) * 0.5;
    a.x -= nx * overlap; a.y -= ny * overlap;
    b.x += nx * overlap; b.y += ny * overlap;

    const dvx = b.vx - a.vx;
    const dvy = b.vy - a.vy;
    const dvn = dvx * nx + dvy * ny;

    if (dvn < 0) {
      const impulse = -(1 + P.restitution) * dvn * 0.5;
      a.vx -= impulse * nx; a.vy -= impulse * ny;
      b.vx += impulse * nx; b.vy += impulse * ny;
    }
  }
}

// ── Rendu ─────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  const [a, b] = particles;

  // ligne inter-centres (debug léger)
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.strokeStyle = 'rgba(180, 90, 40, 0.10)';
  ctx.lineWidth = 1;
  ctx.stroke();

  const fills = ['rgba(232, 112, 64, 0.88)', 'rgba(200, 85, 45, 0.80)'];
  for (let i = 0; i < 2; i++) {
    const p = particles[i];

    // — limite membrane : cercle pointillé (rayon limitR) —
    ctx.save();
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.arc(p.x, p.y, P.limitR, 0, Math.PI * 2);
    ctx.strokeStyle = fills[i].replace(/[\d.]+\)$/, P.limitOpacity + ')');
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();

    // — core plein (rayon coreR) —
    ctx.beginPath();
    ctx.arc(p.x, p.y, P.coreR, 0, Math.PI * 2);
    ctx.fillStyle = fills[i];
    ctx.fill();

    // — centre debug —
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fill();
  }
}

// ── Boucle principale ─────────────────────────────────────
function loop(ts) {
  const dt = lastTs === null ? 0.016 : Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  physics(dt);
  collide();
  draw();

  const [a, b] = particles;
  const dx = b.x - a.x, dy = b.y - a.y;
  document.getElementById('info').textContent =
    `dist: ${Math.sqrt(dx*dx + dy*dy).toFixed(0)} px  |  dom: ${dominance[0].toFixed(2)} / ${dominance[1].toFixed(2)}`;

  requestAnimationFrame(loop);
}

// ── Sliders ───────────────────────────────────────────────
function bindSlider(sliderId, valId, key, fmt) {
  const s = document.getElementById(sliderId);
  const v = document.getElementById(valId);
  v.textContent = fmt ? fmt(P[key]) : P[key];
  s.addEventListener('input', () => {
    P[key] = parseFloat(s.value);
    v.textContent = fmt ? fmt(P[key]) : P[key];
  });
}

bindSlider('sAttr',    'vAttr',    'attrK');
bindSlider('sFric',    'vFric',    'fricK');
bindSlider('sRep',     'vRep',     'repK',
  v => v >= 1000000 ? (v/1000000).toFixed(1)+'M' : (v/1000).toFixed(0)+'k');
bindSlider('sCurl',    'vCurl',    'curlK');
bindSlider('sRest',    'vRest',    'restitution');
bindSlider('sProx',    'vProx',    'proxMult',   v => v.toFixed(1) + '×');
bindSlider('sContour', 'vContour', 'contourStr', v => v.toFixed(2));
bindSlider('sCoreR',   'vCoreR',   'coreR',      v => Math.round(v));
bindSlider('sLimitR',  'vLimitR',  'limitR',     v => Math.round(v));
bindSlider('sLimitO',  'vLimitO',  'limitOpacity', v => v.toFixed(2));

// délai rôle (non stocké dans P)
(function () {
  const s = document.getElementById('sSwitch');
  const v = document.getElementById('vSwitch');
  s.addEventListener('input', () => {
    window._switchSpeed = parseFloat(s.value);
    v.textContent = parseFloat(s.value).toFixed(1);
  });
  window._switchSpeed = 1.2;
})();

// ── Démarrage ─────────────────────────────────────────────
requestAnimationFrame(loop);
</script>
</body>
</html>
