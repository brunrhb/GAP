<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAP · Chaud</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #e87050; }
    canvas { display: block; }
    .ui {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 10;
    }
    .ui a, .ui button {
      font-family: -apple-system, sans-serif; font-size: 11px;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(255,255,255,0.75); text-decoration: none;
      padding: 6px 14px; border: 1px solid rgba(255,255,255,0.22);
      border-radius: 20px; background: rgba(0,0,0,0.18);
      backdrop-filter: blur(10px); cursor: pointer; transition: background 0.2s;
    }
    .ui a:hover, .ui button:hover { background: rgba(0,0,0,0.32); }
    .label {
      position: fixed; top: 20px; left: 20px;
      font-family: -apple-system, sans-serif; font-size: 11px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.38); z-index: 10; pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="label">GAP · Chaud — pêche/orange domine · cool en contrepoint</div>
  <div class="ui">
    <a href="index.html">← index</a>
    <a href="sale.html">sale</a>
    <a href="froid.html">froid</a>
    <a href="creme.html">crème</a>
    <a href="vif.html">vif</a>
    <button onclick="savePNG('gap-chaud')">↓ png</button>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="./_gradient.js"></script>
  <script>
    initGradient(document.getElementById('c'), {
      // orange/pêche domine · lavande cool en contrepoint
      color1:   '#e87050',  // warm3 (GAP)
      color2:   '#f4c4b8',  // warm1 pêche (GAP)
      color3:   '#d8d4e8',  // lavande gris (contrepoint cool)
      speed:    0.35,
      strength: 1.45,
      grain:    0.038
    })
  </script>
</body>
</html>
